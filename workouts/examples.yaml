workouts:
  - name: "Easy Run 45min"
    estimated_duration_minutes: 45
    steps:
      - kind: warmup
        duration: "10:00"
      - kind: run
        duration: "30:00"
        pace: easy
      - kind: cooldown
        duration: "5:00"

  - name: "6x400m Intervals"
    estimated_duration_minutes: 40
    steps:
      - kind: warmup
        duration: "10:00"
      - repeat: 6
        steps:
          - kind: run
            duration: 400m
            duration_type: distance
            pace: interval
          - kind: recover
            duration: 400m
            duration_type: distance
      - kind: cooldown
        duration: "10:00"

  - name: "Tempo 20min"
    estimated_duration_minutes: 40
    steps:
      - kind: warmup
        duration: "10:00"
      - kind: run
        duration: "20:00"
        pace: tempo
      - kind: cooldown
        duration: "10:00"

  - name: "Long Run 90min"
    estimated_duration_minutes: 90
    steps:
      - kind: warmup
        duration: "10:00"
      - kind: run
        duration: "70:00"
        pace: easy
      - kind: cooldown
        duration: "10:00"

  - name: "5x1km Intervals"
    estimated_duration_minutes: 50
    steps:
      - kind: warmup
        duration: "15:00"
      - repeat: 5
        steps:
          - kind: run
            duration: 1km
            duration_type: distance
            pace: threshold
          - kind: recover
            duration: "2:00"
      - kind: cooldown
        duration: "10:00"

  - name: "Fartlek 40min"
    estimated_duration_minutes: 40
    steps:
      - kind: warmup
        duration: "10:00"
      - repeat: 4
        steps:
          - kind: run
            duration: "3:00"
            pace: tempo
          - kind: recover
            duration: "2:00"
            pace: easy
      - kind: cooldown
        duration: "10:00"
