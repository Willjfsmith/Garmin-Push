<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#171A1F">
<meta name="description" content="Home Strength Blueprint — a 15-minute daily strength program you can do with dumbbells, bands, or no equipment.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Strength">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Strength Blueprint</title>
<style>
/* ================================================================= TOKENS */
:root{
  --paper:#F4F3EF; --card:#FFFFFF; --ink:#171A1F; --muted:#5E6167;
  --hair:#C9C8C2; --accent:#5C6470;
  --plateA:#C0392B; --plateB:#1F4E9C; --plateC:#D9A413; --plateD:#2E7D4B; --plateE:#5C6470;
  --radius:16px; --tap:48px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --head:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --body:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){
  :root{ --paper:#15171B; --card:#1E2127; --ink:#F0F0EC; --muted:#9A9DA4; --hair:#33373E; }
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:16px; line-height:1.4;
  -webkit-text-size-adjust:100%; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:16px}
h1,h2,h3{font-family:var(--head);margin:0;letter-spacing:.01em}
.app{max-width:720px;margin:0 auto;min-height:100vh;padding:0 0 calc(72px + var(--safe-b))}

/* ================================================================= HEADER */
header.top{
  position:sticky;top:0;z-index:20;background:var(--paper);
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;border-bottom:1px solid var(--hair);
}
header.top .title{font-size:20px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;flex:1}
header.top .title small{display:block;font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--muted)}
.icon-btn{
  width:var(--tap);height:var(--tap);min-width:var(--tap);
  border:1px solid var(--hair);border-radius:12px;background:var(--card);
  display:flex;align-items:center;justify-content:center;
}
.icon-btn svg{width:22px;height:22px}

/* ================================================================= BANDS / CHIPS */
.band{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ink);color:var(--paper);
  padding:7px 12px;border-radius:999px;
  font-family:var(--head);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;
  background:var(--card);border:1px solid var(--hair);color:var(--muted);
}
.chip.solid{background:var(--accent);color:#fff;border-color:transparent}

/* ================================================================= CARDS */
main{padding:16px}
.card{
  background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);
  padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.card + .card{margin-top:14px}
.section-h{
  font-family:var(--head);font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--paper);background:var(--ink);border-radius:999px;
  padding:6px 12px;display:inline-block;margin:22px 0 12px;
}
.muted{color:var(--muted)}
.small{font-size:13px}

/* ================================================================= COLUMN CARD */
.col-card{
  border-radius:var(--radius);color:#fff;padding:18px;position:relative;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.14);
}
.col-card .letter{
  font-family:var(--head);font-size:52px;font-weight:900;line-height:.9;letter-spacing:-.02em;opacity:.95;
}
.col-card .cmeta{margin-top:6px}
.col-card .cname{font-size:20px;font-weight:800}
.col-card .cstyle{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.9}
.col-card .cstats{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.col-card .cstat{background:rgba(255,255,255,.18);border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700}
.col-card .cnote{margin-top:10px;font-size:13px;opacity:.92;font-style:italic}

/* ================================================================= EXERCISE ROW */
.ex{
  display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--hair);
}
.ex:last-child{border-bottom:0}
.ex .badge{
  width:30px;height:30px;min-width:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-weight:900;font-size:15px;color:#fff;
}
.ex .pico{width:52px;height:38px;min-width:52px}
.ex .exbody{flex:1;min-width:0}
.ex .exname{font-weight:700;font-size:15px}
.ex .excue{font-size:12px;color:var(--muted);margin-top:1px}
.ex .extarget{font-size:12.5px;margin-top:3px}
.ex .extarget b{color:var(--ink)}
.ex .sug{color:var(--plateD);font-weight:700}

.pico svg{width:100%;height:100%;display:block}

/* ================================================================= BUTTONS */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;min-height:var(--tap);padding:14px 18px;border-radius:14px;
  border:1px solid transparent;font-weight:800;font-size:16px;
  font-family:var(--head);letter-spacing:.04em;text-transform:uppercase;
  background:var(--ink);color:var(--paper);
}
.btn.secondary{background:var(--card);color:var(--ink);border-color:var(--hair)}
.btn.accent{background:var(--accent)}
.btn.ghost{background:transparent;border-color:var(--hair);color:var(--muted);text-transform:none;letter-spacing:0;font-weight:700}
.btn.danger{background:var(--plateA)}
.btn-row{display:flex;gap:12px;margin-top:14px}
.btn-row .btn{margin-top:0}
.btn:active{transform:translateY(1px)}

/* streak */
.streak{display:flex;align-items:center;gap:8px;font-weight:800;font-family:var(--head)}
.streak .flame{font-size:20px}

/* ================================================================= TAB BAR */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--card);border-top:1px solid var(--hair);
  display:flex;padding-bottom:var(--safe-b);
  max-width:720px;margin:0 auto;
}
nav.tabs button{
  flex:1;background:none;border:0;padding:8px 0 6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;min-height:56px;
}
nav.tabs button svg{width:24px;height:24px}
nav.tabs button.active{color:var(--ink)}
nav.tabs button.active svg{stroke:var(--ink)}

section[hidden]{display:none}

/* ================================================================= PLAYER OVERLAY */
.overlay{
  position:fixed;inset:0;z-index:50;background:var(--paper);
  display:flex;flex-direction:column;padding:0 20px calc(20px + var(--safe-b));
  overflow:auto;
}
.overlay .obar{display:flex;align-items:center;gap:12px;padding:16px 0 4px}
.overlay .obar .phase{flex:1;font-family:var(--head);font-weight:800;text-transform:uppercase;letter-spacing:.1em;font-size:14px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:8px 0}
.ring{position:relative;width:min(74vw,300px);aspect-ratio:1}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring .track{fill:none;stroke:var(--hair);stroke-width:8}
.ring .prog{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .25s linear}
.reduced .ring .prog{transition:none}
.ring .center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
}
.ring .time{font-family:var(--head);font-weight:900;font-size:56px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.ring .sub{font-size:13px;color:var(--muted);margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.player-ex{text-align:center;margin-top:6px}
.player-ex .pbig{width:120px;height:88px;margin:0 auto}
.player-ex .pname{font-family:var(--head);font-weight:800;font-size:22px;margin-top:6px}
.player-ex .pcue{color:var(--muted);font-size:14px;margin-top:4px;max-width:340px;margin-left:auto;margin-right:auto}
.player-ex .ptarget{margin-top:8px;font-weight:800;font-family:var(--head);letter-spacing:.03em}
.player-list{margin:10px auto;max-width:360px;text-align:left}
.player-list li{padding:6px 0;border-bottom:1px solid var(--hair);font-size:15px}
.player-ctrls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:auto;padding-top:16px}
.player-ctrls .btn{margin-top:0}
.player-ctrls .wide{grid-column:1 / -1}

/* dialog */
.modal-back{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--card);border-radius:var(--radius);padding:22px;max-width:360px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.modal h3{font-size:18px;margin-bottom:8px}
.modal p{color:var(--muted);margin:0 0 16px}

/* quick-log sheet */
.log-ex{display:grid;grid-template-columns:1fr;gap:6px;padding:12px 0;border-bottom:1px solid var(--hair)}
.log-ex .lname{font-weight:700}
.log-ex .sets{display:flex;gap:8px;flex-wrap:wrap}
.log-ex .setin{display:flex;flex-direction:column;gap:2px}
.log-ex .setin label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center}
.log-ex input{
  width:64px;text-align:center;padding:10px 6px;border:1px solid var(--hair);border-radius:10px;
  background:var(--paper);color:var(--ink);
}

/* ================================================================= SNACKS */
.snack{
  display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;
  border:1px solid var(--hair);background:var(--card);margin-bottom:12px;
}
.snack .num{
  width:38px;height:38px;min-width:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-weight:900;color:#fff;
}
.snack.done{opacity:.6}
.snack .strig{font-weight:800;font-size:15px}
.snack .sexo{font-size:13px;color:var(--muted)}
.snack .pico{width:56px;height:42px;min-width:56px}
.snack .schk{width:26px;height:26px;border-radius:50%;border:2px solid var(--hair);display:flex;align-items:center;justify-content:center}
.snack.done .schk{background:var(--plateD);border-color:var(--plateD);color:#fff}
.progressbar{height:12px;border-radius:999px;background:var(--hair);overflow:hidden;margin:4px 0 18px}
.progressbar>span{display:block;height:100%;background:var(--plateD);transition:width .3s}

/* ================================================================= PROGRESS */
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.heat .hd{aspect-ratio:1;border-radius:5px;background:var(--hair)}
.heat .hd.rest{background:transparent;border:1px dashed var(--hair)}
.heat .hd.partial{background:#9ec9ad}
.heat .hd.full{background:var(--plateD)}
.heat .hd.future{background:transparent}
.heatlabels{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
.heatlabels span{text-align:center;font-size:10px;color:var(--muted);font-weight:700}
.spark{width:100%;height:36px;display:block;margin-top:6px}
.histlog{padding:8px 0;border-bottom:1px solid var(--hair);font-size:14px;display:flex;justify-content:space-between;gap:10px}
.histlog .hdate{color:var(--muted);font-size:12px}

/* settings */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-weight:700;font-size:14px}
.field input,.field select,.field textarea{
  padding:12px;border:1px solid var(--hair);border-radius:10px;background:var(--paper);color:var(--ink);width:100%;
}
.field textarea{min-height:110px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;resize:vertical}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--hair)}
.switch{position:relative;width:52px;height:30px}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--hair);border-radius:999px;transition:.2s}
.switch .sl:before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--plateD)}
.switch input:checked + .sl:before{transform:translateX(22px)}
.seg{display:flex;border:1px solid var(--hair);border-radius:10px;overflow:hidden}
.seg button{flex:1;padding:12px;background:var(--paper);border:0;font-weight:700}
.seg button.on{background:var(--ink);color:var(--paper)}

@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important;scroll-behavior:auto !important}
}

/* pictogram helpers */
.fig{fill:none;stroke:currentColor;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.gnd{stroke:#C9C8C2;stroke-width:3;stroke-linecap:round}
.eq{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.eqf{fill:var(--accent);stroke:none}
.mo{stroke:var(--accent);stroke-width:3;fill:none;stroke-linecap:round}
</style>
</head>

<script>
"use strict";
(function(){
/* ================================================================= DATA */
const COLUMNS = [
  { id:"A", name:"Dumbbells",    style:"Heavy",  scheme:"3×6–8",   restSec:90, color:"#C0392B", equipment:"dumbbells" },
  { id:"B", name:"Bands",        style:"Volume", scheme:"3×12–15", restSec:45, color:"#1F4E9C", equipment:"bands" },
  { id:"C", name:"No Equipment", style:"Tempo",  scheme:"3×10–12", restSec:45, color:"#D9A413", equipment:"none",
    note:"3-second lowering on every rep" },
  { id:"D", name:"No Equipment", style:"Power",  scheme:"3×5–8",   restSec:75, color:"#2E7D4B", equipment:"none",
    note:"maximum explosive intent, perfect form" },
  { id:"E", name:"Full Kit",     style:"Mix",    scheme:"3×8–10",  restSec:60, color:"#5C6470", equipment:"dumbbells + bands" },
];
const ROWS = ["Squat","Hinge","Push","Pull","Core"];
const EXERCISES = [
  ["Goblet Squat","Banded Squat","1.5-Rep Squat","Squat Jump","DB Bulgarian Split Squat"],
  ["DB Romanian Deadlift","Band Good Morning","Single-Leg Glute Bridge","Broad Jump","DB Swing"],
  ["DB Floor Press","Band Overhead Press","Tempo Push-Up","Plyo Push-Up","Banded Push-Up"],
  ["Bent-Over DB Row","Band Lat Pulldown","Towel Door Row","Table Inverted Row","Renegade Row"],
  ["Suitcase Carry","Pallof Press","Slow Dead Bug","Mountain Climbers","Plank DB Drag"],
];
const WEEK_PLAN = { Mon:"A", Tue:"B", Wed:"C", Thu:"D", Fri:"E" };
const WARMUP  = ["Arm circles + band pull-aparts","Bodyweight squats ×10 + hip hinges ×10","Push-up to down-dog ×5"];
const COOLDOWN= ["Doorway chest stretch","Couch stretch (hip flexors)","Standing hamstring stretch"];
const SESSION = [
  { phase:"warmup",   sec:120 },
  { phase:"round",    n:1, sec:330 },
  { phase:"round",    n:2, sec:330 },
  { phase:"cooldown", sec:120 },
];
const SNACKS = [
  { trigger:"With coffee",   row:0 }, { trigger:"Before lunch",  row:1 },
  { trigger:"3pm slump",     row:2 }, { trigger:"After work",    row:3 },
  { trigger:"Before dinner", row:4 },
];
const PROGRESSION = [
  { week:1, label:"Baseline",     rule:"Learn the moves. Log every weight and rep." },
  { week:2, label:"+1 Rep",       rule:"Same weights, add one rep to every set." },
  { week:3, label:"Top of Range", rule:"Add one more rep — hit the rep ceiling." },
  { week:4, label:"Add Weight",   rule:"Heavier DB / thicker band. Reps reset to bottom of range." },
];
// per-exercise one-line form cues, indexed [row][col]
const CUES = [
  ["DB at chest, elbows inside knees, sit between your heels",
   "Band under feet, drive your knees out against the band",
   "Down, halfway up, back down, then stand — that's one rep",
   "Explode up, land soft with bent knees, reset each rep",
   "Rear foot on a box, drop straight down over the front heel"],
  ["Soft knees, push hips back, DBs graze the thighs, flat back",
   "Band on your traps, hinge at the hips, load the hamstrings",
   "One foot planted, drive hips up, squeeze the glute at the top",
   "Swing the arms, jump forward for distance, stick the landing",
   "Hike the DB back, snap the hips forward, arms stay relaxed"],
  ["Back on the floor, press the DBs up, elbows stop at the ground",
   "Band under feet, press overhead, keep your ribs down",
   "Three seconds down, chest to floor, press up strong",
   "Explode off the floor, hands leave, land soft and reset",
   "Band across your back, push up against the extra tension"],
  ["Hinge forward, pull DBs to your hips, squeeze shoulder blades",
   "Anchor the band high, pull your elbows down to your ribs",
   "Towel round the handle, lean back, pull your chest to the door",
   "Under a sturdy table, pull chest to the edge, body straight",
   "Plank on the DBs, row one up, keep your hips square"],
  ["One DB at your side, walk tall, don't lean or tilt",
   "Band at chest from the side, press out, resist the twist",
   "Low back pinned down, extend opposite arm and leg slowly",
   "Strong plank, drive the knees fast, keep the hips level",
   "Plank over a DB, drag it side to side, hips stay still"],
];

/* ================================================================= STORE */
const KEY = "hsb.v1";
function defaultState(){
  return {
    settings:{ startDate:todayISO(), units:"kg", favorite:"A", sound:true, vibrate:true },
    logs:[], snacksDone:{}, sessionsDone:{}
  };
}
let S = defaultState();
function load(){
  let raw = null;
  try { raw = localStorage.getItem(KEY); } catch(e){ raw = null; }
  if(!raw){ S = defaultState(); save(); return; }
  try {
    const parsed = JSON.parse(raw);
    S = migrate(parsed);
  } catch(e){
    try { localStorage.setItem(KEY+".corrupt", raw); } catch(_){}
    S = defaultState(); save();
  }
}
function migrate(obj){
  const d = defaultState();
  if(!obj || typeof obj !== "object") return d;
  const s = Object.assign({}, d.settings, obj.settings || {});
  return {
    settings:s,
    logs: Array.isArray(obj.logs) ? obj.logs : [],
    snacksDone: (obj.snacksDone && typeof obj.snacksDone==="object") ? obj.snacksDone : {},
    sessionsDone: (obj.sessionsDone && typeof obj.sessionsDone==="object") ? obj.sessionsDone : {},
  };
}
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){ /* quota / private mode */ }
}

/* ================================================================= CLOCK & CYCLE */
function pad2(n){ return n<10 ? "0"+n : ""+n; }
function isoOf(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function todayISO(){ return isoOf(new Date()); }
function parseISO(s){ const p=(s||"").split("-"); return new Date(+p[0], (+p[1]||1)-1, +p[2]||1); }
function addDays(d,n){ const x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
const WK = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const WKLONG = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function weekdayKey(d){ return WK[d.getDay()]; }
function columnForDate(d){ return WEEK_PLAN[weekdayKey(d)] || null; } // null => weekend
function isWeekend(d){ return !columnForDate(d); }
function weekOfCycle(d){
  const start = parseISO(S.settings.startDate);
  const days = Math.floor((stripTime(d) - stripTime(start)) / 86400000);
  if(days < 0) return 1;
  return (Math.floor(days/7) % 4) + 1;
}
function stripTime(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); }
function colById(id){ return COLUMNS.find(c=>c.id===id); }

/* ================================================================= PROGRESSION */
function parseRange(scheme){
  // "3×6–8"  ->  {sets:3, low:6, high:8}
  const m = scheme.split("×");
  const sets = parseInt(m[0],10) || 3;
  const rng = (m[1]||"").split(/[–\-]/);
  const low = parseInt(rng[0],10) || 0;
  const high = parseInt(rng[1],10) || low;
  return { sets, low, high };
}
function loadType(col){
  if(/dumbbell/.test(col.equipment)) return "db";
  if(/band/.test(col.equipment)) return "band";
  return "bw";
}
function lastLogFor(exName){
  for(let i=S.logs.length-1;i>=0;i--){ if(S.logs[i].exercise===exName) return S.logs[i]; }
  return null;
}
function fmtWeight(w, lt){
  if(lt==="bw") return "BW";
  if(w===null || w===undefined || w==="") return "—";
  if(lt==="band") return "L"+w;              // band level
  return w + S.settings.units;
}
// returns object describing today's target for an exercise
function computeTarget(rowIdx, colIdx, week){
  const col = COLUMNS[colIdx];
  const exName = EXERCISES[rowIdx][colIdx];
  const { sets, low, high } = parseRange(col.scheme);
  const lt = loadType(col);
  const inc = S.settings.units==="kg" ? 2.5 : 5;
  const last = lastLogFor(exName);
  let targetReps = low, targetW = (lt==="bw"?null:null), sug="";

  if(last && last.sets && last.sets.length){
    const reps = last.sets.map(s=> +s.r || 0);
    const ws   = last.sets.map(s=> +s.w || 0);
    const lastW = Math.max.apply(null, ws.concat([0]));
    const maxRep = Math.max.apply(null, reps);
    const allTop = reps.every(r=> r>=high);
    targetW = (lt==="bw") ? null : (lastW>0 ? lastW : null);

    if(week===1){
      targetReps = low;
    } else if(week===2 || week===3){
      targetReps = Math.min(maxRep+1, high);
      if(lt==="bw" && maxRep>=high){
        sug = (col.id==="C") ? "slow the tempo" : "add height / distance";
      }
    } else { // week 4 — add weight
      if(allTop){
        if(lt==="db"){ targetW = (targetW||0)+inc; targetReps=low; sug="↑ "+inc+S.settings.units; }
        else if(lt==="band"){ targetReps=low; sug="↑ next band"; }
        else { targetReps=high; sug=(col.id==="C")?"slow the tempo":"add height / distance"; }
      } else {
        targetReps = Math.min(maxRep+1, high);
      }
    }
  } else {
    targetReps = low; // no history yet
  }
  return { col, exName, sets, low, high, lt, last, targetReps, targetW, sug };
}
function targetLineHTML(t){
  const todayW = fmtWeight(t.targetW, t.lt);
  const today = todayW + " × " + t.sets + "×" + t.targetReps;
  let html;
  if(t.last && t.last.sets && t.last.sets.length){
    const lt = t.lt;
    const lw = fmtWeight(Math.max.apply(null, t.last.sets.map(s=>+s.w||0).concat([0])) || null, lt);
    const reps = t.last.sets.map(s=> +s.r||0).join(",");
    html = "Last: <b>"+lw+" × "+reps+"</b> → Today: <b>"+today+"</b>";
  } else {
    html = "Today: <b>"+today+"</b>";
  }
  if(t.sug) html += ' <span class="sug">'+t.sug+'</span>';
  return html;
}

/* ================================================================= STREAK & COMPLETION */
function allSnacks(iso){ const a=S.snacksDone[iso]; return a && a.length>=5; }
function dayComplete(iso){
  if(S.sessionsDone[iso]) return true;
  const a = S.snacksDone[iso];
  return !!(a && a.length>=3);
}
function currentStreak(){
  let n=0, d=new Date();
  if(!dayComplete(todayISO())) d = addDays(d,-1);
  while(dayComplete(isoOf(d))){ n++; d = addDays(d,-1); }
  return n;
}

/* ================================================================= AUDIO */
let AC = null;
function beep(freq, dur, when){
  if(!S.settings.sound) return;
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const t = AC.currentTime + (when||0);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type="sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.3, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.15));
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+(dur||0.15)+0.02);
  }catch(e){}
}
function cueChime(){ beep(660,0.12,0); beep(880,0.14,0.13); }
function cueRestEnd(){ beep(520,0.1,0); beep(700,0.1,0.12); beep(920,0.16,0.24); }
function vibrate(ms){ if(S.settings.vibrate && navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

/* ================================================================= WAKE LOCK */
let wakeLock = null;
async function requestWake(){
  try{ if(navigator.wakeLock){ wakeLock = await navigator.wakeLock.request("screen"); } }catch(e){}
}
function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible" && Player.active && !wakeLock) requestWake();
});

/* ================================================================= HELPERS */
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function pico(rowIdx, colIdx, cls){
  return '<svg class="'+(cls||"pico")+'" viewBox="0 0 100 70" style="--accent:'+COLUMNS[colIdx].color+';color:var(--ink)"><use href="#p'+rowIdx+colIdx+'"/></svg>';
}
function mmss(sec){ sec=Math.max(0,Math.round(sec)); return Math.floor(sec/60)+":"+pad2(sec%60); }

/* ================================================================= RENDER: TODAY */
function renderToday(){
  const wrap = document.getElementById("view-today");
  const now = new Date();
  const weekend = isWeekend(now);
  const week = weekOfCycle(now);
  const prog = PROGRESSION[week-1];
  let colId = columnForDate(now);
  let usingFavorite = false;
  if(weekend){ colId = S.settings.favorite || "A"; usingFavorite = true; }
  const col = colById(colId);
  const colIdx = COLUMNS.indexOf(col);

  const streak = currentStreak();
  let html = "";

  // header banner
  html += '<div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
  html += '<div style="flex:1;min-width:160px"><div style="font-family:var(--head);font-weight:800;font-size:20px">'+WKLONG[now.getDay()]+'</div>';
  html += '<div class="small muted">Cycle Week '+week+' of 4 · '+esc(prog.label)+'</div></div>';
  html += '<div class="streak"><span class="flame">🔥</span><span>'+streak+'</span><span class="small muted" style="font-weight:600">day'+(streak===1?"":"s")+'</span></div>';
  html += '</div>';
  html += '<div class="band" style="margin-top:12px">'+esc(prog.rule)+'</div>';

  // weekend rest view
  if(weekend){
    html += '<div class="card" style="margin-top:14px"><h2 style="font-size:18px">Rest day</h2>';
    html += '<p class="muted small" style="margin:8px 0 14px">Walk, stretch, or repeat a favorite column.</p>';
    html += '<div class="field" style="margin-bottom:0"><label>Repeat a column</label><select id="favPick">';
    COLUMNS.forEach(c=>{ html += '<option value="'+c.id+'"'+(c.id===colId?" selected":"")+'>'+c.id+' · '+esc(c.name)+' ('+esc(c.style)+')</option>'; });
    html += '</select></div></div>';
  }

  // column card
  html += '<div class="col-card" style="background:'+col.color+';margin-top:14px">';

/* ================================================================= RENDER: PROGRESS */
function renderProgress(){
  const wrap = document.getElementById("view-progress");
  const now = new Date();
  const week = weekOfCycle(now);

  let html = '<div class="section-h">Last 8 Weeks</div>';
  html += '<div class="card">';
  html += '<div class="heatlabels">'+["M","T","W","T","F","S","S"].map(x=>'<span>'+x+'</span>').join("")+'</div>';
  html += '<div class="heat">';
  // build 8 weeks ending this week; align to Monday
  const today = new Date();
  const dow = (today.getDay()+6)%7; // 0=Mon
  const monday = addDays(today, -dow - 7*7); // start 8 weeks back (Mon)
  for(let i=0;i<56;i++){
    const d = addDays(monday, i);
    const diso = isoOf(d);
    let cls = "hd";
    if(stripTime(d) > stripTime(today)) cls += " future";
    else if(isWeekend(d) && !dayComplete(diso) && !(S.snacksDone[diso]&&S.snacksDone[diso].length)) cls += " rest";
    else if(S.sessionsDone[diso] || allSnacks(diso)) cls += " full";
    else if(S.snacksDone[diso] && S.snacksDone[diso].length>0) cls += " partial";
    html += '<div class="'+cls+'" title="'+diso+'"></div>';
  }
  html += '</div>';
  html += '<div style="display:flex;gap:14px;margin-top:12px;flex-wrap:wrap" class="small muted">';
  html += '<span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--plateD);vertical-align:-1px"></span> done</span>';
  html += '<span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#9ec9ad;vertical-align:-1px"></span> partial</span>';
  html += '<span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;border:1px dashed var(--hair);vertical-align:-1px"></span> rest</span>';
  html += '</div></div>';

  // cycle position
  html += '<div class="section-h">Cycle</div><div class="card">';
  html += '<div style="display:flex;align-items:center;gap:12px"><div style="flex:1"><div style="font-family:var(--head);font-weight:800;font-size:18px">Week '+week+' of 4</div>';
  html += '<div class="small muted">'+esc(PROGRESSION[week-1].label)+' — '+esc(PROGRESSION[week-1].rule)+'</div></div>';
  html += '<button class="btn ghost" id="resetCycle" style="width:auto">Reset to Week 1</button></div></div>';

  // per-exercise history
  html += '<div class="section-h">Exercise History</div><div class="card">';
  const logged = {};
  S.logs.forEach(l=> logged[l.exercise]=true);
  const names = [];
  EXERCISES.forEach(row=> row.forEach(n=>{ if(logged[n] && names.indexOf(n)===-1) names.push(n); }));
  if(!names.length){
    html += '<p class="muted small" style="margin:0">No logs yet. Finish a session or a snack and your history shows up here.</p>';
  } else {
    html += '<div class="field" style="margin-bottom:12px"><select id="histPick">';
    names.forEach(n=> html += '<option value="'+esc(n)+'">'+esc(n)+'</option>');
    html += '</select></div><div id="histBody"></div>';
  }
  html += '</div>';

  wrap.innerHTML = html;
  const rc = document.getElementById("resetCycle");
  if(rc) rc.addEventListener("click", ()=>{
    confirmDialog("Reset cycle?","This sets the program start to today, making today Week 1.", ()=>{
      S.settings.startDate = todayISO(); save(); renderProgress(); renderToday();
    });
  });
  const hp = document.getElementById("histPick");
  if(hp){ hp.addEventListener("change", ()=> renderHistBody(hp.value)); renderHistBody(hp.value); }
}
function renderHistBody(name){
  const body = document.getElementById("histBody");
  if(!body) return;
  const logs = S.logs.filter(l=>l.exercise===name);
  let html = "";
  // sparkline of est volume
  const vols = logs.map(l=> l.sets.reduce((a,s)=> a + (+s.w||0)*(+s.r||0), 0));
  const anyW = vols.some(v=>v>0);
  if(logs.length>=2 && anyW){
    const w=280,h=36, max=Math.max.apply(null,vols)||1, min=Math.min.apply(null,vols);
    const pts = vols.map((v,i)=>{
      const x = logs.length>1 ? (i/(logs.length-1))*w : 0;
      const y = h - 4 - ((v-min)/((max-min)||1))*(h-8);
      return x.toFixed(1)+","+y.toFixed(1);
    }).join(" ");
    html += '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="var(--plateD)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html += '<div class="small muted" style="margin-bottom:8px">Estimated volume (weight × reps)</div>';
  }
  logs.slice().reverse().forEach(l=>{
    const sets = l.sets.map(s=> (+s.w? (s.w+ (loadType(colById(l.col)) ==="band"?"L":S.settings.units)) : "BW")+"×"+(+s.r||0)).join("  ");
    html += '<div class="histlog"><span>'+sets+'</span><span class="hdate">'+esc(l.date)+' · '+esc(l.col)+'</span></div>';
  });
  body.innerHTML = html;
}

/* ================================================================= PLAYER (state machine) */
const Player = {
  active:false, steps:[], idx:0, colId:null, colIdx:0, mode:"session",
  startTs:0, dur:0, paused:false, pausedAt:0, pauseAccum:0, raf:0, snackRow:null,
  ended:false,

  buildSessionSteps(colId){
    const col = colById(colId); const colIdx = COLUMNS.indexOf(col);
    const steps = [];
    steps.push({ type:"warmup", sec:120, title:"Warm-up", list:WARMUP });
    for(let round=1; round<=2; round++){
      for(let r=0;r<5;r++){
        steps.push({ type:"exercise", round, row:r, colIdx, sec:66 });
      }
    }
    // insert rests between exercises (and between rounds)
    const withRest = [steps[0]];
    const exOnly = steps.slice(1);
    exOnly.forEach((s,i)=>{
      withRest.push(s);
      if(i < exOnly.length-1) withRest.push({ type:"rest", sec:col.restSec });
    });
    withRest.push({ type:"cooldown", sec:120, title:"Cool-down", list:COOLDOWN });
    withRest.push({ type:"summary" });
    return withRest;
  },
  buildSnackSteps(colId, row){
    const col = colById(colId);
    const steps = [];
    steps.push({ type:"warmup", sec:15, title:"Quick warm-up", list:["Loosen up — a few easy reps, no load"] });
    for(let set=1; set<=3; set++){
      steps.push({ type:"exercise", round:set, row, colIdx:COLUMNS.indexOf(col), sec:40, snackSet:set });
      if(set<3) steps.push({ type:"rest", sec:col.restSec });
    }
    steps.push({ type:"summary" });
    return steps;
  },

  startSession(colId){ this._start(colId, "session", this.buildSessionSteps(colId)); },
  startSnack(colId, row){ this.snackRow=row; this._start(colId, "snack", this.buildSnackSteps(colId, row)); },

  _start(colId, mode, steps){
    this.active=true; this.ended=false; this.mode=mode; this.colId=colId; this.colIdx=COLUMNS.indexOf(colById(colId));
    this.steps=steps; this.idx=0;
    document.documentElement.classList.toggle("reduced", matchMedia("(prefers-reduced-motion: reduce)").matches);
    requestWake();
    try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); AC.resume&&AC.resume(); }catch(e){}
    this.renderShell();
    this.enter(0);
  },
  enter(i){
    this.idx=i;
    const step = this.steps[i];
    if(!step){ this.finish(); return; }
    if(step.type==="summary"){ this.finish(); return; }
    this.startTs = Date.now(); this.dur = step.sec; this.paused=false; this.pauseAccum=0;
    if(step.type==="rest") { cueChime(); }
    else if(step.type!=="exercise") { cueChime(); }
    this.renderStep();
    this.loop();
  },
  elapsed(){
    if(this.paused) return (this.pausedAt - this.startTs - this.pauseAccum)/1000;
    return (Date.now() - this.startTs - this.pauseAccum)/1000;
  },
  remaining(){ return this.dur - this.elapsed(); },
  loop(){
    cancelAnimationFrame(this.raf);
    const tick = ()=>{
      if(!this.active) return;
      const rem = this.remaining();
      this.paint(rem);
      const step = this.steps[this.idx];
      if(rem<=0 && (step.type==="rest" || step.type==="warmup" || step.type==="cooldown")){
        if(step.type==="rest"){ cueRestEnd(); vibrate([80,60,80]); }
        else { cueChime(); vibrate(120); }
        this.next(true); return;
      }
      if(rem<=0 && step.type==="exercise" && !step._dinged){
        step._dinged=true; beep(760,0.12,0); vibrate(60);
      }
      this.raf = requestAnimationFrame(tick);
    };
    this.raf = requestAnimationFrame(tick);
  },
  paint(rem){
    const ring = document.getElementById("ringProg");
    const timeEl = document.getElementById("ringTime");
    if(timeEl) timeEl.textContent = mmss(rem);
    if(ring){
      const C = 2*Math.PI*52;
      const frac = Math.max(0, Math.min(1, rem/this.dur));
      ring.style.strokeDasharray = C;
      ring.style.strokeDashoffset = C*(1-frac);
    }
  },
  next(auto){
    const step=this.steps[this.idx];
    if(step && step.type==="exercise") step._dinged=false;
    this.enter(this.idx+1);
  },
  skip(){ this.enter(this.idx+1); },
  add30(){ this.dur += 30; this.paint(this.remaining()); },
  togglePause(){
    if(this.paused){
      this.pauseAccum += (Date.now() - this.pausedAt);
      this.paused=false; this.loop();
    } else {
      this.paused=true; this.pausedAt=Date.now();
      cancelAnimationFrame(this.raf);
    }
    this.renderControls();
  },
  exit(){
    confirmDialog("Exit workout?","Your progress in this session won't be saved.", ()=>{
      this.teardown();
    });
  },
  teardown(){
    this.active=false; cancelAnimationFrame(this.raf); releaseWake();
    document.getElementById("overlayRoot").innerHTML="";
  },

  renderShell(){
    const col = colById(this.colId);
    const root = document.getElementById("overlayRoot");
    root.innerHTML = "";
    const ov = el('<div class="overlay" style="--accent:'+col.color+'"></div>');
    ov.innerHTML =
      '<div class="obar"><button class="icon-btn" id="pExit" aria-label="Exit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>'+
      '<div class="phase" id="pPhase" style="color:'+col.color+'"></div>'+
      '<button class="icon-btn" id="pMute" aria-label="Mute"></button></div>'+
      '<div id="pStage"></div>';
    root.appendChild(ov);
    ov.querySelector("#pExit").addEventListener("click", ()=>this.exit());
    const mute = ov.querySelector("#pMute");
    const paintMute=()=>{ mute.innerHTML = S.settings.sound
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8a5 5 0 0 1 0 8"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>'; };
    paintMute();
    mute.addEventListener("click", ()=>{ S.settings.sound=!S.settings.sound; save(); paintMute(); if(S.settings.sound) cueChime(); });
  },
  renderStep(){
    const step=this.steps[this.idx];
    const col = colById(this.colId);
    const phase = document.getElementById("pPhase");
    const stage = document.getElementById("pStage");
    let phaseLabel="";
    if(step.type==="warmup") phaseLabel = step.title;
    else if(step.type==="cooldown") phaseLabel = step.title;
    else if(step.type==="rest") phaseLabel = "Rest";
    else if(step.type==="exercise") phaseLabel = this.mode==="snack" ? ("Set "+step.round+" of 3") : ("Round "+step.round+" · "+(step.row+1)+"/5");
    phase.textContent = phaseLabel;

    let html = '<div class="ring-wrap"><div class="ring"><svg viewBox="0 0 120 120"><circle class="track" cx="60" cy="60" r="52"/><circle class="prog" id="ringProg" cx="60" cy="60" r="52" style="stroke:'+col.color+'"/></svg>';
    html += '<div class="center"><div class="time" id="ringTime">'+mmss(step.sec)+'</div><div class="sub">'+esc(phaseLabel)+'</div></div></div></div>';

    if(step.type==="exercise"){
      const exName = EXERCISES[step.row][step.colIdx];
      const t = computeTarget(step.row, step.colIdx, weekOfCycle(new Date()));
      html += '<div class="player-ex">'+pico(step.row, step.colIdx, "pbig");
      html += '<div class="pname">'+esc(exName)+'</div>';
      html += '<div class="pcue">'+esc(CUES[step.row][step.colIdx])+'</div>';
      html += '<div class="ptarget" style="color:'+col.color+'">'+col.scheme+' · '+esc(col.style)+'</div></div>';
    } else if(step.type==="rest"){
      const nextStep = this.steps[this.idx+1];
      let up="";
      if(nextStep && nextStep.type==="exercise") up = "Next: "+EXERCISES[nextStep.row][nextStep.colIdx];
      html += '<div class="player-ex"><div class="pname">Rest</div><div class="pcue">'+esc(up)+'</div></div>';
    } else { // warmup / cooldown
      html += '<div class="player-ex"><div class="pname">'+esc(step.title)+'</div><ul class="player-list">'+
        step.list.map(x=>'<li>'+esc(x)+'</li>').join("")+'</ul></div>';
    }

    // controls
    html += '<div class="player-ctrls" id="pCtrls"></div>';
    stage.innerHTML = html;
    this.renderControls();
    this.paint(step.sec);
  },
  renderControls(){
    const c = document.getElementById("pCtrls");
    if(!c) return;
    const step=this.steps[this.idx];
    const nextLabel = step.type==="rest" ? "Skip rest" :
                      step.type==="exercise" ? (this.mode==="snack"&&step.round===3?"Finish set":"Next") : "Skip";
    c.innerHTML =
      '<button class="btn secondary" id="cPause">'+(this.paused?"Resume":"Pause")+'</button>'+
      '<button class="btn secondary" id="cAdd">+30s</button>'+
      '<button class="btn wide" id="cNext" style="background:'+colById(this.colId).color+'">'+nextLabel+' ▸</button>';
    c.querySelector("#cPause").addEventListener("click", ()=>this.togglePause());
    c.querySelector("#cAdd").addEventListener("click", ()=>this.add30());
    c.querySelector("#cNext").addEventListener("click", ()=>this.skip());
  },

  finish(){
    this.active=false; cancelAnimationFrame(this.raf); releaseWake();
    cueChime(); vibrate([100,50,100]);
    if(this.mode==="snack") this.finishSnack();
    else this.finishSession();
  },
  finishSession(){
    const col = colById(this.colId); const colIdx=this.colIdx;
    const week = weekOfCycle(new Date());
    const root = document.getElementById("overlayRoot");
    root.innerHTML="";
    const ov = el('<div class="overlay" style="--accent:'+col.color+'"></div>');
    let html = '<div class="obar"><div class="phase" style="flex:1;color:'+col.color+'">Session complete</div></div>';
    html += '<div style="text-align:center;margin:10px 0 6px"><div style="font-size:48px">✅</div><h2 style="font-size:22px;margin-top:6px">Nice work</h2><p class="muted small">Log your sets — targets are pre-filled.</p></div>';
    html += '<div class="card" style="margin-bottom:16px">';
    for(let r=0;r<5;r++){
      const t = computeTarget(r, colIdx, week);
      html += '<div class="log-ex" data-row="'+r+'"><div class="lname">'+(r+1)+'. '+esc(t.exName)+'</div><div class="sets">';
      for(let s=0;s<t.sets;s++){
        const wv = t.lt==="bw" ? "" : (t.targetW!=null?t.targetW:"");
        html += '<div class="setin"><label>W'+(s+1)+'</label><input type="number" inputmode="decimal" class="w" data-s="'+s+'" value="'+wv+'" placeholder="'+(t.lt==="bw"?"–":"") +'"'+(t.lt==="bw"?" disabled":"")+'></div>';
        html += '<div class="setin"><label>R'+(s+1)+'</label><input type="number" inputmode="numeric" class="r" data-s="'+s+'" value="'+t.targetReps+'"></div>';
      }
      html += '</div></div>';
    }
    html += '</div>';
    html += '<div class="player-ctrls"><button class="btn secondary wide" id="skipLog">Skip logging</button><button class="btn wide" id="saveLog" style="background:'+col.color+'">Save session</button></div>';
    ov.innerHTML = html;
    root.appendChild(ov);

    const collect = ()=>{
      const iso = todayISO();
      ov.querySelectorAll(".log-ex").forEach(node=>{
        const r = +node.getAttribute("data-row");
        const exName = EXERCISES[r][colIdx];
        const ws = [...node.querySelectorAll("input.w")];
        const rs = [...node.querySelectorAll("input.r")];
        const sets = rs.map((ri,i)=>({ w: ws[i]&&ws[i].value!==""? +ws[i].value : 0, r: ri.value!==""? +ri.value : 0 }))
                        .filter(s=> s.r>0 || s.w>0);
        if(sets.length) S.logs.push({ date:iso, col:this.colId, mode:"session", row:r, exercise:exName, sets });
      });
      S.sessionsDone[iso] = this.colId;
      save();
    };
    ov.querySelector("#saveLog").addEventListener("click", ()=>{ collect(); this.teardown(); toast("Session saved 💪"); switchTab("today"); });
    ov.querySelector("#skipLog").addEventListener("click", ()=>{
      S.sessionsDone[todayISO()] = this.colId; save();
      this.teardown(); toast("Marked complete"); switchTab("today");
    });
  },
  finishSnack(){
    const col = colById(this.colId); const r=this.snackRow;
    const week = weekOfCycle(new Date());
    const t = computeTarget(r, this.colIdx, week);
    const root = document.getElementById("overlayRoot");
    root.innerHTML="";
    const ov = el('<div class="overlay" style="--accent:'+col.color+'"></div>');
    let html = '<div class="obar"><div class="phase" style="flex:1;color:'+col.color+'">Snack done</div></div>';
    html += '<div style="text-align:center;margin:10px 0 6px"><div style="font-size:44px">🍎</div><h2 style="font-size:20px;margin-top:6px">'+esc(t.exName)+'</h2><p class="muted small">Log it or just tick it off.</p></div>';
    html += '<div class="card" style="margin-bottom:16px"><div class="log-ex" style="border:0"><div class="sets">';
    for(let s=0;s<t.sets;s++){
      const wv = t.lt==="bw" ? "" : (t.targetW!=null?t.targetW:"");
      html += '<div class="setin"><label>W'+(s+1)+'</label><input type="number" inputmode="decimal" class="w" value="'+wv+'"'+(t.lt==="bw"?" disabled":"")+'></div>';
      html += '<div class="setin"><label>R'+(s+1)+'</label><input type="number" inputmode="numeric" class="r" value="'+t.targetReps+'"></div>';
    }
    html += '</div></div></div>';
    html += '<div class="player-ctrls"><button class="btn secondary wide" id="skipLog">Just tick it</button><button class="btn wide" id="saveLog" style="background:'+col.color+'">Save snack</button></div>';
    ov.innerHTML = html;
    root.appendChild(ov);

    const mark = ()=>{
      const iso=todayISO();
      if(!S.snacksDone[iso]) S.snacksDone[iso]=[];
      if(S.snacksDone[iso].indexOf(r)===-1) S.snacksDone[iso].push(r);
      if(S.snacksDone[iso].length>=5) S.sessionsDone[iso] = S.sessionsDone[iso] || this.colId;
    };
    ov.querySelector("#saveLog").addEventListener("click", ()=>{
      const iso=todayISO();
      const ws=[...ov.querySelectorAll("input.w")], rs=[...ov.querySelectorAll("input.r")];
      const sets = rs.map((ri,i)=>({ w: ws[i]&&ws[i].value!==""?+ws[i].value:0, r: ri.value!==""?+ri.value:0 })).filter(s=>s.r>0||s.w>0);
      if(sets.length) S.logs.push({ date:iso, col:this.colId, mode:"snack", row:r, exercise:t.exName, sets });
      mark(); save(); this.teardown();
      const n=(S.snacksDone[iso]||[]).length;
      toast(n>=5?"All 5 done — day complete! 🔥":("Snack "+n+"/5")); switchTab("snacks");
    });
    ov.querySelector("#skipLog").addEventListener("click", ()=>{
      mark(); save(); this.teardown();
      const n=(S.snacksDone[todayISO()]||[]).length;
      toast(n>=5?"All 5 done — day complete! 🔥":("Snack "+n+"/5")); switchTab("snacks");
    });
  }
};

/* ================================================================= INIT */
function init(){
  load();
  // roll snacks over at local midnight — snacksDone is keyed by date so nothing to clear;
  // just ensure today's key exists lazily. Old keys remain for the heatmap.
  document.querySelectorAll("nav.tabs button").forEach(b=>{
    b.addEventListener("click", ()=> switchTab(b.getAttribute("data-tab")));
  });
  document.getElementById("gearBtn").addEventListener("click", ()=> switchTab("settings"));
  switchTab("today");

  // re-render Today if the day changed while the app stayed open
  let lastDay = todayISO();
  setInterval(()=>{
    const now = todayISO();
    if(now!==lastDay){ lastDay=now; if(!Player.active){ switchTab("today"); } }
  }, 60000);

  // service worker: only when hosted over https
  if(location.protocol==="https:" && "serviceWorker" in navigator){
    window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
  }
}
init();
})();
</script>
</body>
</html>
