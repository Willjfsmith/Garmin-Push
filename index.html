<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#171A1F">
<meta name="description" content="Home Strength Blueprint — a 15-minute daily strength program you can do with dumbbells, bands, or no equipment.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Strength">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Strength Blueprint</title>
<style>
/* ================================================================= TOKENS */
:root{
  --paper:#F4F3EF; --card:#FFFFFF; --ink:#171A1F; --muted:#5E6167;
  --hair:#C9C8C2; --accent:#5C6470;
  --plateA:#C0392B; --plateB:#1F4E9C; --plateC:#D9A413; --plateD:#2E7D4B; --plateE:#5C6470;
  --radius:12px; --tap:44px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --head:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --body:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]){ --paper:#15171B; --card:#1E2127; --ink:#F0F0EC; --muted:#9A9DA4; --hair:#33373E; }
}
:root[data-theme="dark"]{ --paper:#15171B; --card:#1E2127; --ink:#F0F0EC; --muted:#9A9DA4; --hair:#33373E; }
:root[data-theme="light"]{ --paper:#F4F3EF; --card:#FFFFFF; --ink:#171A1F; --muted:#5E6167; --hair:#C9C8C2; }
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--body); font-size:15px; line-height:1.33;
  -webkit-text-size-adjust:100%; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:16px}
h1,h2,h3{font-family:var(--head);margin:0;letter-spacing:.01em}
.app{max-width:720px;margin:0 auto;min-height:100vh;padding:0 0 calc(128px + var(--safe-b))}

/* ================================================================= HEADER */
header.top{
  position:sticky;top:0;z-index:20;background:var(--paper);
  display:flex;align-items:center;gap:8px;
  padding:8px 12px 7px;border-bottom:1px solid var(--hair);
}
header.top .title{font-size:16px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;flex:1}
header.top .title small{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted)}
.icon-btn{
  width:40px;height:40px;min-width:40px;
  border:1px solid var(--hair);border-radius:10px;background:var(--card);
  display:flex;align-items:center;justify-content:center;
}
.icon-btn svg{width:20px;height:20px}

/* ================================================================= BANDS / CHIPS */
.band{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ink);color:var(--paper);
  padding:5px 11px;border-radius:999px;
  font-family:var(--head);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;line-height:1.25;
}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;
  background:var(--card);border:1px solid var(--hair);color:var(--muted);
}
.chip.solid{background:var(--accent);color:#fff;border-color:transparent}

/* ================================================================= CARDS */
main{padding:12px}
.card{
  background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);
  padding:11px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.card + .card{margin-top:10px}
.section-h{
  font-family:var(--head);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--paper);background:var(--ink);border-radius:999px;
  padding:4px 10px;display:inline-block;margin:13px 0 7px;
}
.muted{color:var(--muted)}
.small{font-size:12.5px}

/* ================================================================= COLUMN CARD */
.col-card{
  border-radius:var(--radius);color:#fff;padding:13px;position:relative;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.14);
}
.col-card .letter{
  font-family:var(--head);font-size:40px;font-weight:900;line-height:.9;letter-spacing:-.02em;opacity:.95;
}
.col-card .cmeta{margin-top:2px}
.col-card .cname{font-size:17px;font-weight:800}
.col-card .cstyle{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.9}
.col-card .cstats{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.col-card .cstat{background:rgba(255,255,255,.18);border-radius:8px;padding:4px 8px;font-size:12px;font-weight:700}
.col-card .cnote{margin-top:8px;font-size:12px;opacity:.92;font-style:italic}

/* ================================================================= EXERCISE ROW */
.ex{
  display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--hair);
}
.ex:last-child{border-bottom:0}
.ex .badge{
  width:24px;height:24px;min-width:24px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-weight:900;font-size:13px;color:#fff;
}
.ex .pico{width:44px;height:32px;min-width:44px}
.ex .exbody{flex:1;min-width:0}
.ex .exname{font-weight:700;font-size:14px}
.ex .excue{font-size:11.5px;color:var(--muted);margin-top:0}
.ex .extarget{font-size:12px;margin-top:2px}
.ex .extarget b{color:var(--ink)}
.ex .sug{color:var(--plateD);font-weight:700}

.pico svg{width:100%;height:100%;display:block}

/* ================================================================= BUTTONS */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;min-height:var(--tap);padding:10px 14px;border-radius:10px;
  border:1px solid transparent;font-weight:800;font-size:14px;
  font-family:var(--head);letter-spacing:.03em;text-transform:uppercase;
  background:var(--ink);color:var(--paper);
}
.btn.secondary{background:var(--card);color:var(--ink);border-color:var(--hair)}
.btn.accent{background:var(--accent)}
.btn.ghost{background:transparent;border-color:var(--hair);color:var(--muted);text-transform:none;letter-spacing:0;font-weight:700}
.btn.danger{background:var(--plateA)}
.btn-row{display:flex;gap:10px;margin-top:10px}
.btn-row .btn{margin-top:0}
.btn:active{transform:translateY(1px)}

/* streak */
.streak{display:flex;align-items:center;gap:6px;font-weight:800;font-family:var(--head)}
.streak .flame{font-size:17px}

/* ================================================================= TAB BAR */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--card);border-top:1px solid var(--hair);
  display:flex;padding-bottom:var(--safe-b);
  max-width:720px;margin:0 auto;
}
nav.tabs button{
  flex:1;background:none;border:0;padding:6px 0 5px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--muted);font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;min-height:50px;
}
nav.tabs button svg{width:21px;height:21px}
nav.tabs button.active{color:var(--ink)}
nav.tabs button.active svg{stroke:var(--ink)}

section[hidden]{display:none}

/* ================================================================= PLAYER OVERLAY */
.overlay{
  position:fixed;inset:0;z-index:50;background:var(--paper);
  display:flex;flex-direction:column;padding:0 20px calc(20px + var(--safe-b));
  overflow:auto;
}
.overlay .obar{display:flex;align-items:center;gap:12px;padding:16px 0 4px}
.overlay .obar .phase{flex:1;font-family:var(--head);font-weight:800;text-transform:uppercase;letter-spacing:.1em;font-size:14px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:8px 0}
.ring{position:relative;width:min(74vw,300px);aspect-ratio:1}
.ring.small{width:min(42vw,165px)}
.ring.small .time{font-size:30px}
.ring.small .sub{font-size:10px;margin-top:2px}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring .track{fill:none;stroke:var(--hair);stroke-width:8}
.ring .prog{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .25s linear}
.reduced .ring .prog{transition:none}
.ring .center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
}
.ring .time{font-family:var(--head);font-weight:900;font-size:56px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.ring .sub{font-size:13px;color:var(--muted);margin-top:6px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.player-ex{text-align:center;margin-top:6px}
.player-ex .pbig{width:120px;height:88px;margin:0 auto}
.player-ex .pname{font-family:var(--head);font-weight:800;font-size:22px;margin-top:6px}
.player-ex .pcue{color:var(--muted);font-size:14px;margin-top:4px;max-width:340px;margin-left:auto;margin-right:auto}
.player-ex .ptarget{margin-top:8px;font-weight:800;font-family:var(--head);letter-spacing:.03em}
.player-list{margin:10px auto;max-width:360px;text-align:left}
.player-list li{padding:6px 0;border-bottom:1px solid var(--hair);font-size:15px}
.player-ctrls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:auto;padding-top:14px}
.player-ctrls .btn{padding-left:6px;padding-right:6px}
.player-ctrls .btn{margin-top:0}
.player-ctrls .wide{grid-column:1 / -1}

/* dialog */
.modal-back{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--card);border-radius:var(--radius);padding:22px;max-width:360px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.modal h3{font-size:18px;margin-bottom:8px}
.modal p{color:var(--muted);margin:0 0 16px}

/* quick-log sheet */
.lset{margin-top:7px}
.lset .lshead{display:flex;align-items:center;gap:8px}
.lset .setn{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);min-width:38px}
/* rep pad: ALL numbers visible (wrapping grid), single tap to pick */
.reppad{display:flex;flex-wrap:wrap;gap:4px;padding:6px 1px 2px}
.reppad button{
  flex:0 0 auto;width:31px;height:33px;border-radius:8px;border:1px solid var(--hair);
  background:var(--paper);color:var(--ink);font-weight:800;font-size:13px;padding:0;
}
.reppad button.on{background:var(--accent);color:#fff;border-color:transparent}
.setw{width:82px;text-align:center;padding:8px 6px;border:1px solid var(--hair);border-radius:9px;background:var(--paper);color:var(--ink)}

/* ================================================================= SNACKS */
.snack{
  display:flex;align-items:center;gap:10px;padding:9px;border-radius:11px;
  border:1px solid var(--hair);background:var(--card);margin-bottom:8px;
}
.snack .num{
  width:30px;height:30px;min-width:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-weight:900;color:#fff;font-size:14px;
}
.snack.done{opacity:.6}
.snack .strig{font-weight:800;font-size:14px}
.snack .sexo{font-size:12px;color:var(--muted)}
.snack .pico{width:44px;height:33px;min-width:44px}
.snack .schk{width:24px;height:24px;min-width:24px;border-radius:50%;border:2px solid var(--hair);display:flex;align-items:center;justify-content:center}
.snack.done .schk{background:var(--plateD);border-color:var(--plateD);color:#fff}
.progressbar{height:9px;border-radius:999px;background:var(--hair);overflow:hidden;margin:4px 0 12px}
.progressbar>span{display:block;height:100%;background:var(--plateD);transition:width .3s}

/* ================================================================= PROGRESS */
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heat .hd{aspect-ratio:1;border-radius:4px;background:var(--hair);cursor:pointer}
.heat .hd.rest{background:transparent;border:1px dashed var(--hair)}
.heat .hd.partial{background:#9ec9ad}
.heat .hd.full{background:var(--plateD)}
.heat .hd.future{background:transparent}
.heat .hd.today{outline:2px solid var(--ink);outline-offset:1px}
.heatlabels{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
.heatlabels span{text-align:center;font-size:10px;color:var(--muted);font-weight:700}
.spark{width:100%;height:36px;display:block;margin-top:6px}
.histlog{padding:6px 0;border-bottom:1px solid var(--hair);font-size:13px;display:flex;justify-content:space-between;gap:10px}
.histlog .hdate{color:var(--muted);font-size:11.5px}

/* settings */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.field label{font-weight:700;font-size:13px}
.field input,.field select,.field textarea{
  padding:9px 10px;border:1px solid var(--hair);border-radius:9px;background:var(--paper);color:var(--ink);width:100%;
}
.field textarea{min-height:96px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;resize:vertical}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--hair)}
.switch{position:relative;width:52px;height:30px}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--hair);border-radius:999px;transition:.2s}
.switch .sl:before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--plateD)}
.switch input:checked + .sl:before{transform:translateX(22px)}
.seg{display:flex;border:1px solid var(--hair);border-radius:9px;overflow:hidden}
.seg button{flex:1;padding:9px;background:var(--paper);border:0;font-weight:700;font-size:13px}
.seg button.on{background:var(--ink);color:var(--paper)}

@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important;scroll-behavior:auto !important}
}

/* KPI tiles */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.kpi{background:var(--paper);border:1px solid var(--hair);border-radius:10px;padding:9px 11px}
.kpi b{display:block;font-family:var(--head);font-size:21px;font-weight:900;letter-spacing:-.01em;line-height:1}
.kpi span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}
/* achievements */
.achs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.ach{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;opacity:.32;filter:grayscale(1)}
.ach.on{opacity:1;filter:none}
.ach .aic{font-size:20px;line-height:1}
.ach .alab{font-size:8.5px;color:var(--muted);font-weight:700;line-height:1.1}
/* compact list rows */
.lrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--hair);font-size:13px}
.lrow:last-child{border-bottom:0}
.lrow .lr-main{flex:1;min-width:0}
.lrow .lr-name{font-weight:700}
.lrow .lr-sub{font-size:11.5px;color:var(--muted)}
.lrow .lr-val{font-family:var(--head);font-weight:800;text-align:right}
.lrow .lr-val small{display:block;font-size:10.5px;color:var(--muted);font-weight:600}
/* mini goal ring */
.gring{width:52px;height:52px;min-width:52px;position:relative}
.gring svg{width:100%;height:100%;transform:rotate(-90deg)}
.gring .gt{fill:none;stroke:var(--hair);stroke-width:9}
.gring .gp{fill:none;stroke:var(--plateD);stroke-width:9;stroke-linecap:round}
.gring .gc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:900;font-size:14px}
/* workout-type picker */
.typopt{
  display:flex;align-items:center;gap:11px;padding:10px 12px;margin-bottom:7px;
  border:1.5px solid var(--hair);border-radius:12px;background:var(--card);cursor:pointer;
}
.typopt.on{border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.14)}
.typopt .tl{
  width:34px;height:34px;min-width:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-family:var(--head);font-weight:900;font-size:17px;color:#fff;
}
.typopt.on .tl{background:rgba(255,255,255,.22)!important}
.typopt .tmeta{flex:1;min-width:0}
.typopt .tnm{font-weight:800;font-size:14px;line-height:1.15}
.typopt .tsub{font-size:11.5px;color:var(--muted);margin-top:1px}
.typopt.on .tsub{color:rgba(255,255,255,.9)}
.typopt .tck{font-weight:900;font-size:16px;opacity:0}
.typopt.on .tck{opacity:1}
.typchange{
  display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:8px;margin-bottom:7px;border-radius:10px;border:1.5px dashed var(--hair);
  background:transparent;color:var(--muted);font-weight:700;font-size:12.5px;
}
.inline-note{font-size:11.5px;color:var(--muted);margin-top:6px}
/* player session progress bar */
.pbar{height:4px;border-radius:99px;background:var(--hair);overflow:hidden;margin:2px 0 4px}
.pbar>span{display:block;height:100%;background:var(--accent);transition:width .3s}
.reduced .pbar>span{transition:none}
/* day detail rows in modal */
.dd-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--hair);font-size:13px}
.dd-row:last-child{border-bottom:0}
/* floating quick-log button */
.fab{
  position:fixed;z-index:35;bottom:calc(62px + var(--safe-b));
  right:max(16px, calc(50vw - 360px + 16px));
  width:52px;height:52px;border-radius:50%;border:0;
  background:var(--ink);color:var(--paper);box-shadow:0 4px 14px rgba(0,0,0,.32);
  display:flex;align-items:center;justify-content:center;
}
.fab svg{width:26px;height:26px}
.fab:active{transform:translateY(1px)}
/* quick-log picker */
.qchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.qchip{display:flex;align-items:center;gap:6px;padding:8px 11px;border-radius:999px;border:1.5px solid var(--hair);background:var(--paper);color:var(--ink);font-weight:700;font-size:13px}
.qchip.on{background:var(--ink);color:var(--paper);border-color:transparent}
.modal .pico{width:40px;height:30px;min-width:40px}
.modal{max-height:88vh;overflow:auto}

/* pictogram helpers */
.fig{fill:none;stroke:currentColor;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.gnd{stroke:#C9C8C2;stroke-width:3;stroke-linecap:round}
.eq{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.eqf{fill:var(--accent);stroke:none}
.mo{stroke:var(--accent);stroke-width:3;fill:none;stroke-linecap:round}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="top">
    <div class="title">Strength Blueprint<small id="hdrSub">Home · 15 min</small></div>
    <button class="icon-btn" id="gearBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
    </button>
  </header>

  <main>
    <section id="view-today"></section>
    <section id="view-snacks" hidden></section>
    <section id="view-progress" hidden></section>
    <section id="view-settings" hidden></section>
  </main>
</div>

<nav class="tabs">
  <button data-tab="today" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l2-2 4 4 8-8 2 2"/><path d="M4 20h16"/></svg>
    Today

    S = migrate(parsed);
  } catch(e){
    try { localStorage.setItem(KEY+".corrupt", raw); } catch(_){}
    S = defaultState(); save();
  }
}
function migrate(obj){
  const d = defaultState();
  if(!obj || typeof obj !== "object") return d;
  const s = Object.assign({}, d.settings, obj.settings || {});
  return {
    settings:s,
    snackGoals: Array.isArray(obj.snackGoals) ? obj.snackGoals : d.snackGoals,
    logs: Array.isArray(obj.logs) ? obj.logs : [],
    snacksDone: (obj.snacksDone && typeof obj.snacksDone==="object") ? obj.snacksDone : {},
    sessionsDone: (obj.sessionsDone && typeof obj.sessionsDone==="object") ? obj.sessionsDone : {},
    bodyweight: Array.isArray(obj.bodyweight) ? obj.bodyweight : [],
    achievements: Array.isArray(obj.achievements) ? obj.achievements : [],
  };
}
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){ /* quota / private mode */ }
}

/* ================================================================= CLOCK */
function pad2(n){ return n<10 ? "0"+n : ""+n; }
function isoOf(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function todayISO(){ return isoOf(new Date()); }
function parseISO(s){ const p=(s||"").split("-"); return new Date(+p[0], (+p[1]||1)-1, +p[2]||1); }
function addDays(d,n){ const x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
function stripTime(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); }
function colById(id){ return COLUMNS.find(c=>c.id===id); }

/* ================================================================= PROGRESSION */
// "3×6–8" -> 8: the rep ceiling that, once cleared, means "add load"
function repCeiling(scheme){
  const rng = (scheme.split("×")[1]||"").split(/[–\-]/);
  return parseInt(rng[1],10) || parseInt(rng[0],10) || 12;
}
function loadType(col){
  if(/dumbbell/.test(col.equipment)) return "db";
  if(/band/.test(col.equipment)) return "band";
  return "bw";
}
function lastLogFor(exName){
  for(let i=S.logs.length-1;i>=0;i--){ if(S.logs[i].exercise===exName) return S.logs[i]; }
  return null;
}
function fmtWeight(w, lt){
  if(lt==="bw") return "BW";
  if(w===null || w===undefined || w==="") return "—";
  if(lt==="band") return "L"+w;              // band level
  return w + S.settings.units;
}
// AMRAP model: no prescribed reps. Each working set is "as many good reps as
// you can". The column's rep-range top acts only as the ceiling that, once you
// clear it, tells you to add load (double progression) — you're never told an
// exact number to hit.
function computeTarget(rowIdx, colIdx){
  const col = COLUMNS[colIdx];
  const exName = currentEx(rowIdx, colIdx).n;
  const high = repCeiling(col.scheme);
  const lt = loadType(col);
  const inc = S.settings.units==="kg" ? 2.5 : 5;
  const last = lastLogFor(exName);
  let weight = null, sug = "", beat = null;

  if(last && last.sets && last.sets.length){
    const reps  = last.sets.map(s=> +s.r || 0);
    const ws    = last.sets.map(s=> +s.w || 0);
    const lastW = Math.max.apply(null, ws.concat([0]));
    const bestRep = Math.max.apply(null, reps);
    weight = (lt==="bw") ? null : (lastW>0 ? lastW : null);
    const cleared = bestRep >= high; // beat the rep ceiling last time
    if(cleared){
      if(lt==="db"){ weight = (weight||0)+inc; sug = "add "+inc+S.settings.units; }
      else if(lt==="band"){ sug = "next band up"; }
      else { sug = (col.id==="C") ? "slow the tempo" : "more height / distance"; }
    } else {
      beat = bestRep; // otherwise just beat your best set
    }
  }
  return { col, exName, lt, last, high, weight, sug, beat };
}
function targetLineHTML(t){
  const w = fmtWeight(t.weight, t.lt);
  const today = (t.lt==="bw") ? "AMRAP" : ("AMRAP @ " + (t.weight!=null ? w : "pick a weight"));
  let html;
  if(t.last && t.last.sets && t.last.sets.length){
    const lw = fmtWeight(Math.max.apply(null, t.last.sets.map(s=>+s.w||0).concat([0])) || null, t.lt);
    const reps = t.last.sets.map(s=> +s.r||0).join(",");
    html = "Last: <b>"+lw+" × "+reps+"</b> → <b>"+today+"</b>";
  } else {
    html = "<b>"+today+"</b>";
  }
  if(t.sug) html += ' <span class="sug">↑ '+t.sug+'</span>';
  else if(t.beat!=null) html += ' <span class="sug">beat '+t.beat+'</span>';
  return html;
}

/* ================================================================= STREAK & COMPLETION */
// snacksDone[iso] is {goalId:count}; old backups may hold an array of rows
function snackTapCount(iso){
  const a = S.snacksDone[iso];
  if(!a) return 0;
  if(Array.isArray(a)) return a.length;
  let n=0; for(const k in a) n += (+a[k]||0);
  return n;
}
function goalCount(iso, gid){
  const a = S.snacksDone[iso];
  return (a && !Array.isArray(a) && +a[gid]) || 0;
}
function goalsMet(iso){
  if(!S.snackGoals.length) return false;
  return S.snackGoals.every(g=> goalCount(iso,g.id) >= g.times);
}
function quickCount(iso){ let n=0; for(const l of S.logs) if(l.date===iso && l.mode==="quick") n++; return n; }
// "activity" = snack-goal taps + ad-hoc quick logs done that day
function activityCount(iso){ return snackTapCount(iso) + quickCount(iso); }
function dayComplete(iso){ return !!S.sessionsDone[iso] || goalsMet(iso) || activityCount(iso)>=3; }
function dayLevel(iso){ // 0 nothing, 1 some activity, 2 full
  if(S.sessionsDone[iso] || goalsMet(iso)) return 2;
  if(activityCount(iso)>0) return 1;
  return 0;
}
function currentStreak(){
  let n=0, d=new Date();
  if(!dayComplete(todayISO())) d = addDays(d,-1);
  while(dayComplete(isoOf(d))){ n++; d = addDays(d,-1); }
  return n;
}
function longestStreak(){
  const keys = {};
  Object.keys(S.sessionsDone).forEach(k=> keys[k]=1);
  Object.keys(S.snacksDone).forEach(k=> keys[k]=1);
  S.logs.forEach(l=>{ if(l.mode==="quick") keys[l.date]=1; });
  const days = Object.keys(keys).filter(dayComplete);
  const set = {}; days.forEach(k=> set[k]=1);
  let best=0;
  days.forEach(k=>{
    if(set[isoOf(addDays(parseISO(k),-1))]) return; // not a run start
    let n=0, d=parseISO(k);
    while(set[isoOf(d)]){ n++; d=addDays(d,1); }
    if(n>best) best=n;
  });
  return best;
}

/* ================================================================= STATS / PRs / EFFECTIVE COLUMN */
function totalSessions(){ return Object.keys(S.sessionsDone).length; }
function weekStart(d){ const dow=(d.getDay()+6)%7; return addDays(d,-dow); } // Monday
function inThisWeek(iso){
  const d=parseISO(iso), m=weekStart(new Date());
  return stripTime(d) >= stripTime(m) && stripTime(d) <= stripTime(addDays(m,6));
}
// complete days this week — same rule as the streak (session OR 3+ efforts)
function completeDaysThisWeek(){
  const m = weekStart(new Date()), t = stripTime(new Date());
  let n=0;
  for(let i=0;i<7;i++){ const d=addDays(m,i); if(stripTime(d)<=t && dayComplete(isoOf(d))) n++; }
  return n;
}
function volumeThisWeek(){
  return S.logs.filter(l=>inThisWeek(l.date))
    .reduce((a,l)=> a + l.sets.reduce((b,s)=> b+(+s.w||0)*(+s.r||0),0), 0);
}
function repsThisWeek(){
  return S.logs.filter(l=>inThisWeek(l.date))
    .reduce((a,l)=> a + l.sets.reduce((b,s)=> b+(+s.r||0),0), 0);
}
function est1RM(w,r){ return (w>0&&r>0) ? w*(1+r/30) : 0; }
// best set for an exercise: weighted sets rank by est-1RM; bodyweight sets by reps.
// A weighted best always outranks a rep best (heavier data beats rep counts).
function bestSet(exName, logsArr){
  const arr = logsArr || S.logs;
  let wt=null, bw=null;
  arr.forEach(l=>{ if(l.exercise!==exName) return;
    l.sets.forEach(s=>{
      const W=+s.w||0, R=+s.r||0;
      if(W>0 && R>0){ const e=est1RM(W,R); if(!wt || e>wt.e) wt={ w:W, r:R, e, date:l.date, lt:loadType(colById(l.col)), kind:"wt" }; }
      else if(R>0){ if(!bw || R>bw.r) bw={ w:0, r:R, e:0, date:l.date, lt:"bw", kind:"bw" }; }
    });
  });
  return wt || bw;
}

/* ================================================================= ACHIEVEMENTS */
const ACHIEVEMENTS = [
  { id:"s1",  icon:"🎯", name:"First",   test:()=> totalSessions()>=1 },
  { id:"s10", icon:"💪", name:"10",      test:()=> totalSessions()>=10 },
  { id:"s25", icon:"🏋️", name:"25",      test:()=> totalSessions()>=25 },
  { id:"s50", icon:"⭐", name:"50",      test:()=> totalSessions()>=50 },
  { id:"s100",icon:"👑", name:"100",     test:()=> totalSessions()>=100 },
  { id:"k3",  icon:"🔥", name:"3-day",   test:()=> longestStreak()>=3 },
  { id:"k7",  icon:"🔥", name:"7-day",   test:()=> longestStreak()>=7 },
  { id:"k30", icon:"🏆", name:"30-day",  test:()=> longestStreak()>=30 },
  { id:"pr",  icon:"📈", name:"First log",test:()=> S.logs.some(l=>l.sets.some(s=>(+s.r||0)>0||(+s.w||0)>0)) },
  { id:"bw",  icon:"⚖️", name:"Weigh-in",test:()=> (S.bodyweight||[]).length>0 },
];
function checkAchievements(silent){
  if(!Array.isArray(S.achievements)) S.achievements=[];
  ACHIEVEMENTS.forEach(a=>{
    if(S.achievements.indexOf(a.id)<0 && a.test()){
      S.achievements.push(a.id);
      if(!silent) toast(a.icon+" Badge: "+a.name);
    }
  });
}
// detect new personal records among a freshly-added batch of logs.
// Weighted sets beat the prior weighted best; bodyweight sets beat the prior
// rep best (only while no weighted history exists for that move).
function detectPRs(newLogs){
  const prior = S.logs.slice(0, S.logs.length - newLogs.length);
  const hits = [];
  newLogs.forEach(l=>{
    const before = bestSet(l.exercise, prior);
    l.sets.forEach(s=>{
      const W=+s.w||0, R=+s.r||0;
      let isPR=false;
      if(W>0 && R>0){ isPR = !before || before.kind==="bw" || est1RM(W,R)>before.e+0.01; }
      else if(R>0){ isPR = !before ? true : (before.kind==="bw" && R>before.r); }
      if(isPR && hits.indexOf(l.exercise)<0) hits.push(l.exercise);
    });
  });
  return hits;
}

/* ================================================================= AUDIO */
let AC = null;
function beep(freq, dur, when){
  if(!S.settings.sound) return;
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    const t = AC.currentTime + (when||0);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type="sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.3, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.15));
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+(dur||0.15)+0.02);
  }catch(e){}
}
function cueChime(){ beep(660,0.12,0); beep(880,0.14,0.13); }
function cueRestEnd(){ beep(520,0.1,0); beep(700,0.1,0.12); beep(920,0.16,0.24); }
function vibrate(ms){ if(S.settings.vibrate && navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

let wakeLock = null;
async function requestWake(){

}
function releaseWake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }

function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function pico(rowIdx, colIdx, cls){
  return '<svg class="'+(cls||"pico")+'" viewBox="0 0 100 70" style="--accent:'+COLUMNS[colIdx].color+';color:var(--ink)"><use href="#p'+rowIdx+colIdx+'"/></svg>';
}
function mmss(sec){ sec=Math.max(0,Math.round(sec)); return Math.floor(sec/60)+":"+pad2(sec%60); }
// real length of a full session with the current interval (warmup + 10 work +
// 9 rests, the round break at least 30s, + cooldown)
function sessionDurationMin(){
  const iv = interval();
  const total = 120 + 10*iv.work + 8*iv.rest + Math.max(iv.rest,30) + 120;
  return Math.round(total/60);
}
function lockScroll(on){ document.body.style.overflow = on ? "hidden" : ""; }
// tap-to-pick reps: buttons 1..30 all visible (single click)
function repPad(preset){
  let h = '<div class="reppad" data-val="'+(preset!=null?preset:"")+'">';
  for(let n=1;n<=30;n++) h += '<button type="button" data-n="'+n+'"'+((preset!=null&&+preset===n)?' class="on"':'')+'>'+n+'</button>';
  h += '<button type="button" data-n="35" class="'+((preset!=null&&+preset>30)?"on":"")+'">30+</button></div>';
  return h;
}
function wireRepPads(root, onPick){
  root.querySelectorAll(".reppad").forEach(pad=>{
    pad.addEventListener("click", e=>{
      const b = e.target.closest("button[data-n]"); if(!b) return;
      pad.dataset.val = b.getAttribute("data-n");
      pad.querySelectorAll("button").forEach(x=> x.classList.remove("on"));
      b.classList.add("on");
      vibrate(15);
      if(onPick) onPick(pad, +pad.dataset.val);
    });
  });
}

function goalRingHTML(){

}
let typOpen = false; // type picker expanded?

/* ================================================================= RENDER: SNACKS (self-set daily goals) */
function snackDayCounts(iso){
  // normalise to the {goalId:count} shape (old array data reads as empty)
  let a = S.snacksDone[iso];
  if(!a || Array.isArray(a)){ a = {}; S.snacksDone[iso] = a; }
  return a;
}
function renderSnacks(){
  const wrap = document.getElementById("view-snacks");
  const iso = todayISO();
  const goals = S.snackGoals;
  const met = goals.filter(g=> goalCount(iso,g.id)>=g.times).length;

  let html = '<div class="section-h">Snacks</div>';
  html += '<p class="small muted" style="margin:-4px 0 12px">Set your own mini-goals and tap a card each time you do a set. Hit them all and the day counts.</p>';
  if(goals.length){
    html += '<div class="progressbar"><span style="width:'+(met/goals.length*100)+'%"></span></div>';
    html += '<p class="small" style="font-weight:800;margin:-6px 0 12px">'+met+'/'+goals.length+' goals hit today'+(met>=goals.length?' ✓ day complete':'')+'</p>';
  }

  goals.forEach(g=>{
    const n = goalCount(iso, g.id);
    const hit = n>=g.times;
    let dots=""; for(let i=0;i<g.times;i++) dots += (i<n ? "●" : "○");
    const wtxt = (+g.w>0) ? (" @ "+g.w+S.settings.units) : "";
    html += '<div class="snack'+(hit?' done':'')+'" data-gid="'+esc(g.id)+'" role="button" aria-label="Log a set of '+esc(g.ex)+'">';
    html += pico(g.row, g.col, "pico");
    html += '<div style="flex:1;min-width:0"><div class="strig">'+g.reps+' × '+esc(g.ex)+wtxt+'</div>';
    html += '<div class="sexo">'+g.times+'× today · <span style="letter-spacing:2px">'+dots+'</span></div></div>';
    html += (n>0 ? '<button type="button" class="schk sminus" data-gid="'+esc(g.id)+'" aria-label="Undo one set" style="border:0;background:var(--paper);color:var(--muted);font-weight:900">–</button>' : '');
    html += '<button type="button" class="schk sedit" data-gid="'+esc(g.id)+'" aria-label="Edit goal" style="border:0;background:var(--paper);color:var(--muted)">✎</button>';
    html += '<div class="schk">'+(hit?'✓':n)+'</div>';
    html += '</div>';
  });
  if(!goals.length) html += '<div class="card"><p class="muted small" style="margin:0">No goals yet — add one below. Example: 10 push-ups, 4 times a day.</p></div>';
  html += '<button class="btn secondary" id="addGoal" style="margin-top:6px">+ Add goal</button>';

  wrap.innerHTML = html;

  wrap.querySelectorAll(".snack").forEach(node=>{
    node.addEventListener("click", (e)=>{
      if(e.target.closest(".sedit") || e.target.closest(".sminus")) return;
      const gid = node.getAttribute("data-gid");
      const g = S.snackGoals.find(x=>x.id===gid); if(!g) return;
      const counts = snackDayCounts(iso);
      counts[gid] = (counts[gid]||0)+1;
      const log = { date:iso, col:COLUMNS[g.col].id, mode:"snack", gid, exercise:g.ex, sets:[{ w:+g.w||0, r:+g.reps||0 }] };
      S.logs.push(log);
      const prs = detectPRs([log]); save(); checkAchievements(); save();
      vibrate(20);
      const done = counts[gid]>=g.times;
      toast(prs.length ? ("🏆 New PR: "+g.ex) : (done ? ("✓ "+g.ex+" goal hit!") : (g.ex+" "+counts[gid]+"/"+g.times)));
      renderSnacks();
    });
  });
  wrap.querySelectorAll(".sminus").forEach(b=>{
    b.addEventListener("click", ()=>{
      const gid = b.getAttribute("data-gid");
      const counts = snackDayCounts(iso);
      if(!counts[gid]) return;
      counts[gid]--;
      // drop the most recent matching snack log so history stays honest
      for(let i=S.logs.length-1;i>=0;i--){
        if(S.logs[i].date===iso && S.logs[i].mode==="snack" && S.logs[i].gid===gid){ S.logs.splice(i,1); break; }
      }
      save(); renderSnacks();
    });
  });
  wrap.querySelectorAll(".sedit").forEach(b=>{
    b.addEventListener("click", ()=> editGoal(b.getAttribute("data-gid")));
  });
  document.getElementById("addGoal").addEventListener("click", ()=> editGoal(null));
}

    const i=+ch.getAttribute("data-q"), q=QUICK[i]; back.querySelector("#gSel").value="";

  html += '</div>';

  // heatmap
  html += '<div class="section-h">Last 8 Weeks</div><div class="card">';
  html += '<div class="heatlabels">'+["M","T","W","T","F","S","S"].map(x=>'<span>'+x+'</span>').join("")+'</div>';

    const on = S.achievements.indexOf(a.id) >= 0;

  }).join("");
  html += '</div></div>';

  // per-exercise history
  html += '<div class="section-h">Exercise History</div><div class="card">';

    html += '<p class="muted small" style="margin:0">No logs yet. Finish a session or a snack and your history shows up here.</p>';
  } else {

function renderPRs(){
  const card = document.getElementById("prCard"); if(!card) return;
  const names = []; S.logs.forEach(l=>{ if(names.indexOf(l.exercise)<0) names.push(l.exercise); });
  // weighted PRs first (by est-1RM), then bodyweight rep PRs (by reps)
  const rows = names.map(n=>({ n, b:bestSet(n) })).filter(x=>x.b)
    .sort((a,b)=> (b.b.kind==="wt"?1e6+b.b.e:b.b.r) - (a.b.kind==="wt"?1e6+a.b.e:a.b.r));
  if(!rows.length){ card.innerHTML = '<p class="muted small" style="margin:0">Log any set — your best efforts land here.</p>'; return; }
  card.innerHTML = rows.slice(0,12).map(x=>{
    const b=x.b;
    const val = b.kind==="wt" ? (fmtWeight(b.w,b.lt)+' × '+b.r) : (b.r+' reps');
    const extra = b.kind==="wt"
      ? (b.lt==="db" ? '~'+(Math.round(b.e*10)/10)+S.settings.units+' 1RM' : 'best set')
      : 'rep best';
    return '<div class="lrow"><div class="lr-main"><div class="lr-name">'+esc(x.n)+'</div><div class="lr-sub">'+esc(b.date)+'</div></div>'+
           '<div class="lr-val">'+val+'<small>'+extra+'</small></div></div>';
  }).join("");
}

function renderHistBody(name){
  const body = document.getElementById("histBody");
  if(!body) return;
  const entries = S.logs.map((l,i)=>({l,i})).filter(x=>x.l.exercise===name);
  let html = "";
  // sparkline: volume when weights exist, otherwise total reps per log
  const anyW = entries.some(x=> x.l.sets.some(s=>(+s.w||0)>0));
  const vals = entries.map(x=> x.l.sets.reduce((a,s)=> a + (anyW ? (+s.w||0)*(+s.r||0) : (+s.r||0)), 0));
  if(entries.length>=2 && vals.some(v=>v>0)){
    const w=280,h=36, max=Math.max.apply(null,vals)||1, min=Math.min.apply(null,vals);
    const pts = vals.map((v,i)=>{
      const x = (i/(vals.length-1))*w;
      const y = h - 4 - ((v-min)/((max-min)||1))*(h-8);
      return x.toFixed(1)+","+y.toFixed(1);
    }).join(" ");
    html += '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="var(--plateD)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html += '<div class="small muted" style="margin-bottom:8px">'+(anyW?'Volume (weight × reps)':'Total reps')+' over time</div>';
  }
  entries.slice().reverse().forEach(x=>{
    const l=x.l;
    const sets = l.sets.map(s=> (+s.w? (s.w+ (loadType(colById(l.col)) ==="band"?"L":S.settings.units)) : "BW")+"×"+(+s.r||0)).join("  ");
    html += '<div class="histlog"><span>'+sets+'</span><span style="display:flex;align-items:center;gap:8px"><span class="hdate">'+esc(l.date)+' · '+esc(l.col)+'</span>'+
            '<button type="button" class="histdel" data-i="'+x.i+'" aria-label="Delete this log" style="border:0;background:none;color:var(--muted);font-size:15px;padding:2px 4px;cursor:pointer">✕</button></span></div>';
  });
  body.innerHTML = html;
  body.querySelectorAll(".histdel").forEach(b=>{
    b.addEventListener("click", ()=>{
      const i = +b.getAttribute("data-i");
      confirmDialog("Delete this log?", (S.logs[i]?S.logs[i].date+" · "+S.logs[i].exercise:"")+" — this can't be undone.", ()=>{
        S.logs.splice(i,1); save(); renderProgress();
        const hp = document.getElementById("histPick");
        if(hp && [...hp.options].some(o=>o.value===name)){ hp.value=name; renderHistBody(name); }
      }, "Delete");
    });
  });
}

  document.getElementById("setUnits").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{ st.units=b.getAttribute("data-u"); save(); renderSettings(); });
  });
  document.getElementById("setInterval").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{ st.interval=b.getAttribute("data-iv"); save(); renderSettings(); });
  });
  document.getElementById("setGoal").addEventListener("change", e=>{
    let v=parseInt(e.target.value,10)||5; v=Math.max(1,Math.min(14,v)); st.weeklyGoal=v; save();
  });
  document.getElementById("setTheme").querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{ st.theme=b.getAttribute("data-th"); save(); applyTheme(); renderSettings(); });
  });
  document.getElementById("setSound").addEventListener("change", e=>{ st.sound=e.target.checked; save(); if(e.target.checked) cueChime(); });
  document.getElementById("setVibe").addEventListener("change", e=>{ st.vibrate=e.target.checked; save(); if(e.target.checked) vibrate(60); });
  document.getElementById("copyExport").addEventListener("click", async ()=>{
    const box = document.getElementById("exportBox"); box.select();
    try{ await navigator.clipboard.writeText(box.value); toast("Copied to clipboard"); }
    catch(e){ try{ document.execCommand("copy"); toast("Copied"); }catch(_){ toast("Select the text and copy manually"); } }
  });
  document.getElementById("dlExport").addEventListener("click", ()=>{
    try{
      const blob = new Blob([JSON.stringify(S)], { type:"application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "strength-blueprint-"+todayISO()+".json";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=> URL.revokeObjectURL(a.href), 3000);
      toast("Backup downloaded");
    }catch(e){ toast("Download failed — use Copy instead"); }
  });
  document.getElementById("doImport").addEventListener("click", ()=>{
    const val = document.getElementById("importBox").value.trim();
    if(!val){ toast("Paste JSON first"); return; }
    let parsed;
    try{ parsed = JSON.parse(val); }catch(e){ toast("That isn't valid JSON"); return; }
    confirmDialog("Import data?","This replaces all current data with the imported backup.", ()=>{
      S = migrate(parsed); save(); toast("Imported"); switchTab("today");
    });
  });
  document.getElementById("resetAll").addEventListener("click", ()=>{
    confirmDialog("Reset everything?","This permanently deletes all logs, streaks and settings. This cannot be undone.", ()=>{
      S = defaultState(); save(); toast("All data cleared"); switchTab("today");
    });
  });
}

/* ================================================================= TABS & TOASTS */
function switchTab(tab){
  ["today","snacks","progress","settings"].forEach(t=>{
    document.getElementById("view-"+t).hidden = (t!==tab);
  });
  document.querySelectorAll("nav.tabs button").forEach(b=>{
    const on = b.getAttribute("data-tab")===tab;
    b.classList.toggle("active", on);
    if(on) b.setAttribute("aria-current","page"); else b.removeAttribute("aria-current");
  });
  if(tab==="today") renderToday();
  if(tab==="snacks") renderSnacks();
  if(tab==="progress") renderProgress();
  if(tab==="settings") renderSettings();
  window.scrollTo(0,0);
}
let toastN = 0; // live toast count, so stacked toasts don't overlap
function toast(msg){
  const off = 80 + toastN*50; toastN++;
  const t = el('<div role="status" style="position:fixed;left:50%;bottom:calc('+off+'px + var(--safe-b));transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:11px 16px;border-radius:12px;z-index:80;font-weight:700;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:88vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(msg)+'</div>');
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition="opacity .3s"; t.style.opacity="0"; setTimeout(()=>{ t.remove(); toastN=Math.max(0,toastN-1); },300); }, 1700);
}
function openModal(inner){ // shared backdrop + scroll-lock + close plumbing
  const root = document.getElementById("modalRoot");
  root.innerHTML = ""; lockScroll(true);
  const back = el('<div class="modal-back">'+inner+'</div>');
  root.appendChild(back);
  const close = ()=>{ root.innerHTML=""; lockScroll(false); };
  back.addEventListener("click", e=>{ if(e.target===back) close(); });
  return { back, close };
}
function confirmDialog(title, body, onYes, yesLabel){
  const m = openModal('<div class="modal"><h3>'+esc(title)+'</h3><p>'+esc(body)+'</p><div class="btn-row"><button class="btn secondary" id="mNo">Cancel</button><button class="btn danger" id="mYes">'+esc(yesLabel||"Confirm")+'</button></div></div>');
  m.back.querySelector("#mNo").addEventListener("click", m.close);
  m.back.querySelector("#mYes").addEventListener("click", ()=>{ m.close(); onYes && onYes(); });
}

/* ================================================================= PLAYER (state machine) */
const Player = {
  active:false, steps:[], idx:0, colId:null, colIdx:0,
  startTs:0, dur:0, paused:false, pausedAt:0, pauseAccum:0, raf:0,

  buildSessionSteps(colId){
    const colIdx = COLUMNS.indexOf(colById(colId)); const iv = interval();
    const steps = [{ type:"warmup", sec:120, title:"Warm-up", list:WARMUP }];
    for(let round=1; round<=2; round++){
      for(let r=0;r<5;r++){
        steps.push({ type:"exercise", round, row:r, colIdx, sec:iv.work });
        const isLast = (round===2 && r===4);
        if(!isLast){
          const roundBreak = (r===4); // between the two rounds — a slightly longer breather
          steps.push({ type:"rest", sec: roundBreak ? Math.max(iv.rest,30) : iv.rest, label: roundBreak ? "Round rest" : "Rest" });
        }
      }
    }
    steps.push({ type:"cooldown", sec:120, title:"Cool-down", list:COOLDOWN });
    steps.push({ type:"summary" });
    return steps;
  },
  startSession(colId){ this._start(colId, this.buildSessionSteps(colId)); },

  _start(colId, steps){
    this.active=true; this.colId=colId; this.colIdx=COLUMNS.indexOf(colById(colId));
    this.steps=steps; this.idx=0;
    this.pend={}; // sets captured as you go: pend[row][setIdx] = {w,r}
    document.documentElement.classList.toggle("reduced", matchMedia("(prefers-reduced-motion: reduce)").matches);
    requestWake(); lockScroll(true);
    try{ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); AC.resume&&AC.resume(); }catch(e){}
    this.renderShell();
    this.enter(0);
  },
  enter(i){
    this.idx=i;
    const step = this.steps[i];
    if(!step){ this.finish(); return; }
    if(step.type==="summary"){ this.finish(); return; }
    this.startTs = Date.now(); this.dur = step.sec; this.paused=false; this.pauseAccum=0;
    if(step.type!=="exercise") cueChime();
    this.renderStep();
    this.loop();
  },
  elapsed(){
    if(this.paused) return (this.pausedAt - this.startTs - this.pauseAccum)/1000;
    return (Date.now() - this.startTs - this.pauseAccum)/1000;
  },
  remaining(){ return this.dur - this.elapsed(); },
  loop(){
    cancelAnimationFrame(this.raf);
    const tick = ()=>{
      if(!this.active) return;
      const rem = this.remaining();
      this.paint(rem);
      const step = this.steps[this.idx];
      // 3-2-1 warning ticks at the end of every rest
      if(step.type==="rest"){
        const s = Math.ceil(rem);
        if(s>=1 && s<=3 && step._lastTick!==s){ step._lastTick=s; beep(600,0.06,0); vibrate(25); }
      }
      if(rem<=0 && (step.type==="rest" || step.type==="warmup" || step.type==="cooldown")){
        if(step.type==="rest"){ cueRestEnd(); vibrate([80,60,80]); }
        else { cueChime(); vibrate(120); }
        this.next(true); return;
      }
      if(rem<=0 && step.type==="exercise" && !step._dinged){
        step._dinged=true; beep(760,0.12,0); vibrate(60);
      }
      this.raf = requestAnimationFrame(tick);
    };
    this.raf = requestAnimationFrame(tick);
  },
  paint(rem){
    const ring = document.getElementById("ringProg");
    const timeEl = document.getElementById("ringTime");
    const step = this.steps[this.idx];
    if(timeEl){
      // AMRAP overtime: past zero on an exercise, count UP so you know how far over
      timeEl.textContent = (rem<0 && step && step.type==="exercise") ? "+"+mmss(-rem) : mmss(rem);
    }
    if(ring){
      const C = 2*Math.PI*52;
      const frac = Math.max(0, Math.min(1, rem/this.dur));
      ring.style.strokeDasharray = C;
      ring.style.strokeDashoffset = C*(1-frac);
    }
  },
  next(auto){
    const step=this.steps[this.idx];
    if(step){ step._dinged=false; step._lastTick=null; }
    this.enter(this.idx+1);
  },
  skip(){ this.next(); },
  back(){
    if(this.idx<=0) return;
    const step=this.steps[this.idx];
    if(step){ step._dinged=false; step._lastTick=null; }
    this.enter(this.idx-1);
  },
  add30(){ this.dur += 30; this.paint(this.remaining()); },
  togglePause(){
    if(this.paused){
      this.pauseAccum += (Date.now() - this.pausedAt);
      this.paused=false; this.loop();
    } else {
      this.paused=true; this.pausedAt=Date.now();
      cancelAnimationFrame(this.raf);
    }
    this.renderControls();
  },
  exit(){
    // three-way: keep going / bail out to the log sheet / discard entirely
    const m = openModal('<div class="modal"><h3>Leave workout?</h3><p>You can log what you\'ve done so far, or discard the session.</p>'+
      '<button class="btn" id="xLog" style="margin-bottom:10px">Finish &amp; log now</button>'+
      '<div class="btn-row" style="margin-top:0"><button class="btn secondary" id="xKeep">Keep going</button><button class="btn danger" id="xDrop">Discard</button></div></div>');
    m.back.querySelector("#xKeep").addEventListener("click", m.close);
    m.back.querySelector("#xLog").addEventListener("click", ()=>{ m.close(); this.finish(); });
    m.back.querySelector("#xDrop").addEventListener("click", ()=>{ m.close(); this.teardown(); });
  },
  teardown(){
    this.active=false; cancelAnimationFrame(this.raf); releaseWake(); lockScroll(false);
    document.getElementById("overlayRoot").innerHTML="";
  },

  renderShell(){
    const col = colById(this.colId);
    const root = document.getElementById("overlayRoot");
    root.innerHTML = "";
    const ov = el('<div class="overlay" style="--accent:'+col.color+'"></div>');
    ov.innerHTML =
      '<div class="obar"><button class="icon-btn" id="pExit" aria-label="Exit workout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>'+
      '<div class="phase" id="pPhase" style="color:'+col.color+'"></div>'+
      '<button class="icon-btn" id="pMute" aria-label="Toggle sound"></button></div>'+
      '<div class="pbar" aria-hidden="true"><span id="pProg" style="background:'+col.color+'"></span></div>'+
      '<div id="pStage"></div>';
    root.appendChild(ov);
    ov.querySelector("#pExit").addEventListener("click", ()=>this.exit());
    const mute = ov.querySelector("#pMute");
    const paintMute=()=>{ mute.innerHTML = S.settings.sound
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8a5 5 0 0 1 0 8"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M22 9l-6 6M16 9l6 6"/></svg>'; };
    paintMute();
    mute.addEventListener("click", ()=>{ S.settings.sound=!S.settings.sound; save(); paintMute(); if(S.settings.sound) cueChime(); });
  },
  renderStep(){
    const step=this.steps[this.idx];
    const col = colById(this.colId);
    const phase = document.getElementById("pPhase");
    const stage = document.getElementById("pStage");
    let phaseLabel="";
    if(step.type==="warmup") phaseLabel = step.title;
    else if(step.type==="cooldown") phaseLabel = step.title;
    else if(step.type==="rest") phaseLabel = step.label || "Rest";
    else if(step.type==="exercise") phaseLabel = "Round "+step.round+" · "+(step.row+1)+"/5";
    phase.textContent = phaseLabel;
    // session progress bar (summary step excluded from the denominator)
    const prog = document.getElementById("pProg");
    if(prog) prog.style.width = Math.round(this.idx/(this.steps.length-1)*100)+"%";

    const widget = this.logWidgetHTML(); // log the set you just finished
    const ringCls = widget ? "ring small" : "ring";
    let html = '<div class="ring-wrap"><div class="'+ringCls+'"><svg viewBox="0 0 120 120"><circle class="track" cx="60" cy="60" r="52"/><circle class="prog" id="ringProg" cx="60" cy="60" r="52" style="stroke:'+col.color+'"/></svg>';
    html += '<div class="center"><div class="time" id="ringTime">'+mmss(step.sec)+'</div><div class="sub">'+esc(phaseLabel)+'</div></div></div></div>';

    if(step.type==="exercise"){
      const ex = currentEx(step.row, step.colIdx);
      const t = computeTarget(step.row, step.colIdx);
      const wtxt = t.lt==="bw" ? "Bodyweight" : (t.weight!=null ? fmtWeight(t.weight,t.lt) : "pick a weight");
      html += '<div class="player-ex">'+pico(step.row, step.colIdx, "pbig");
      html += '<div class="pname">'+esc(ex.n)+'</div>';
      html += '<div class="pcue">'+esc(ex.c)+'</div>';
      html += '<div class="ptarget" style="color:'+col.color+'">AMRAP · '+esc(wtxt)+(t.beat!=null?' · beat '+t.beat:'')+(t.sug?' · ↑ '+esc(t.sug):'')+'</div></div>';
    } else if(step.type==="rest"){
      html += widget;
      // and preview the NEXT move so you can set up for it
      const nextStep = this.steps[this.idx+1];
      if(nextStep && nextStep.type==="exercise"){
        const nx = currentEx(nextStep.row, nextStep.colIdx);
        html += '<div class="player-ex" style="margin-top:10px"><div class="pcue" style="margin-top:0">Up next: <b>'+esc(nx.n)+'</b></div>'+
                '<div class="pcue">'+esc(nx.c)+'</div></div>';
      }
    } else { // warmup / cooldown
      html += widget; // cooldown carries the final set's log widget
      html += '<div class="player-ex"><div class="pname">'+esc(step.title)+'</div><ul class="player-list">'+
        step.list.map(x=>'<li>'+esc(x)+'</li>').join("")+'</ul></div>';
    }

    // controls
    html += '<div class="player-ctrls" id="pCtrls"></div>';
    stage.innerHTML = html;
    this.wireLogWidget();
    this.renderControls();
    this.paint(step.sec);
  },
  // compact "log that set" card shown right after each exercise (during rest /
  // cool-down) — weight prefilled, reps are one tap, saved as you go
  logWidgetHTML(){
    const prev = this.steps[this.idx-1];
    if(!prev || prev.type!=="exercise") return "";
    const row = prev.row, si = prev.round-1;
    const t = computeTarget(row, prev.colIdx);
    const ex = currentEx(row, prev.colIdx);
    const cur = (this.pend[row]||[])[si] || {};
    const set1 = (this.pend[row]||[])[0];
    const wv = cur.w ? cur.w : (t.lt==="bw" ? "" : ((set1&&set1.w) || (t.weight!=null?t.weight:"")));
    const wph = t.lt==="band" ? "band lvl" : S.settings.units;
    return '<div class="card lset" id="setLog" data-row="'+row+'" data-set="'+si+'" style="margin-top:2px;padding:9px 11px">'+
      '<div class="lshead"><span class="setn" style="min-width:0">Log · '+esc(ex.n)+' · set '+prev.round+'</span>'+
      (t.lt==="bw" ? '' : '<input type="number" inputmode="decimal" class="w setw" placeholder="'+wph+'" value="'+wv+'" aria-label="Weight" style="margin-left:auto">')+
      '</div>'+ repPad(cur.r||null) +
      (t.beat!=null ? '<div class="small muted" style="margin-top:2px">Last best: '+t.beat+' reps — beat it.</div>' : '')+
      '</div>';
  },
  wireLogWidget(){
    const sl = document.getElementById("setLog");
    if(!sl) return;
    const row = +sl.getAttribute("data-row"), si = +sl.getAttribute("data-set");
    const ensure = ()=>{
      if(!this.pend[row]) this.pend[row]=[];
      if(!this.pend[row][si]) this.pend[row][si]={w:0,r:0};
      return this.pend[row][si];
    };
    const wi = sl.querySelector("input.w");
    if(wi) wi.addEventListener("input", ()=>{ ensure().w = wi.value!=="" ? +wi.value : 0; });
    wireRepPads(sl, (pad, v)=>{
      const p = ensure();
      p.r = v;
      if(wi && wi.value!=="") p.w = +wi.value; // grab the prefilled weight too
    });
  },
  renderControls(){
    const c = document.getElementById("pCtrls");
    if(!c) return;
    const step=this.steps[this.idx];
    const nextLabel = step.type==="rest" ? "Skip rest" :
                      step.type==="exercise" ? "Next" : "Skip";
    c.innerHTML =
      '<button class="btn secondary" id="cBack" aria-label="Previous step"'+(this.idx===0?' disabled style="opacity:.4"':'')+'>◂ Back</button>'+
      '<button class="btn secondary" id="cPause">'+(this.paused?"Resume":"Pause")+'</button>'+
      '<button class="btn secondary" id="cAdd">+30s</button>'+
      '<button class="btn wide" id="cNext" style="background:'+colById(this.colId).color+'">'+nextLabel+' ▸</button>';
    c.querySelector("#cBack").addEventListener("click", ()=>this.back());
    c.querySelector("#cPause").addEventListener("click", ()=>this.togglePause());
    c.querySelector("#cAdd").addEventListener("click", ()=>this.add30());
    c.querySelector("#cNext").addEventListener("click", ()=>this.skip());
  },

  finish(){
    this.active=false; cancelAnimationFrame(this.raf); releaseWake();
    cueChime(); vibrate([100,50,100]);
    this.finishSession();
  },
  finishSession(){
    const col = colById(this.colId); const colIdx=this.colIdx;
    const root = document.getElementById("overlayRoot"); root.innerHTML="";
    const ov = el('<div class="overlay" style="--accent:'+col.color+'"></div>');
    let html = '<div class="obar"><div class="phase" style="flex:1;color:'+col.color+'">Session complete</div></div>';
    html += '<div style="text-align:center;margin:8px 0 4px"><div style="font-size:42px">✅</div><h2 style="font-size:20px;margin-top:4px">Nice work</h2><p class="muted small">Here\'s what you logged along the way.</p></div>';
    html += '<div class="card" style="margin-bottom:14px">';
    let anySets = false;
    for(let r=0;r<5;r++){
      const ex = currentEx(r, colIdx); const t = computeTarget(r, colIdx);
      const sets = (this.pend[r]||[]).filter(s=> s && s.r>0);
      if(sets.length) anySets = true;
      const txt = sets.length
        ? sets.map(s=> (s.w>0 ? fmtWeight(s.w,t.lt) : "BW")+"×"+s.r).join("  ")
        : "—";
      html += '<div class="lrow"><div class="lr-main"><div class="lr-name">'+(r+1)+'. '+esc(ex.n)+'</div></div>'+
              '<div class="lr-val">'+esc(txt)+'</div></div>';
    }
    html += '</div>';
    if(!anySets) html += '<p class="small muted" style="text-align:center;margin:-6px 0 12px">No sets logged — you can still save the session, or add sets later with the ＋ Quick Log.</p>';
    html += '<div class="player-ctrls"><button class="btn secondary wide" id="skipLog">Don\'t save sets</button><button class="btn wide" id="saveLog" style="background:'+col.color+'">Save session</button></div>';
    ov.innerHTML = html; root.appendChild(ov);

    ov.querySelector("#saveLog").addEventListener("click", ()=>{
      const iso = todayISO(); const added=[];
      for(let r=0;r<5;r++){
        const sets = (this.pend[r]||[]).filter(s=> s && s.r>0).map(s=>({ w:+s.w||0, r:+s.r }));
        if(sets.length){
          const log = { date:iso, col:this.colId, mode:"session", row:r, exercise:currentEx(r, colIdx).n, sets };
          S.logs.push(log); added.push(log);
        }
      }
      S.sessionsDone[iso] = this.colId;
      const prs = detectPRs(added); save(); checkAchievements(); save();
      this.teardown();
      toast(prs.length ? ("🏆 New PR: "+prs[0]) : "Session saved 💪"); switchTab("today");
    });
    ov.querySelector("#skipLog").addEventListener("click", ()=>{
      S.sessionsDone[todayISO()] = this.colId; save(); checkAchievements(); save();
      this.teardown(); toast("Marked complete"); switchTab("today");
    });
  },
};

/* ================================================================= INIT */
function init(){
  load();
  applyTheme();
  checkAchievements(true); save(); // record already-earned badges silently
  // roll snacks over at local midnight — snacksDone is keyed by date so nothing to clear;
  // just ensure today's key exists lazily. Old keys remain for the heatmap.
  document.querySelectorAll("nav.tabs button").forEach(b=>{
    b.addEventListener("click", ()=> switchTab(b.getAttribute("data-tab")));
  });
  document.getElementById("gearBtn").addEventListener("click", ()=> switchTab("settings"));
  document.getElementById("fabQuick").addEventListener("click", openQuickLog);
  switchTab("today");

  // re-render Today if the day changed while the app stayed open
  let lastDay = todayISO();
  setInterval(()=>{
    const now = todayISO();
    if(now!==lastDay){ lastDay=now; if(!Player.active){ switchTab("today"); } }
  }, 60000);

  // service worker: only when hosted over https
  if(location.protocol==="https:" && "serviceWorker" in navigator){
    window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
  }
}
init();
})();
